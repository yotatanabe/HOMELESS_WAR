                </p>
                
                <div className="w-full mb-8 relative">
                  <div className="flex justify-between items-end mb-2">
                    <label className="text-sm font-bold text-slate-400">あなたの招待コード (相手に渡す)</label>
                    <button onClick={() => copyToClipboard(localSdp)} className={`text-xs px-3 py-1 rounded transition-colors ${copiedText ? 'bg-green-600 text-white' : 'bg-slate-700 hover:bg-slate-600 text-white'}`}>
                      {copiedText ? '✅ コピー完了' : '📋 コピーする'}
                    </button>
                  </div>
                  <textarea readOnly value={localSdp || 'コード生成中...'} className="w-full h-24 bg-slate-900 text-slate-300 p-3 rounded border border-slate-600 text-xs font-mono focus:outline-none" />
                  {!localSdp && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/50 rounded mt-6"><span className="animate-spin text-2xl">⏳</span></div>}
                </div>

                <div className="w-full mb-6">
                  <label className="text-sm font-bold text-sky-400 mb-2 block">相手からの回答コード を入力</label>
                  <textarea value={remoteSdp} onChange={e => setRemoteSdp(e.target.value)} placeholder="ここに回答コードを貼り付けます" className="w-full h-24 bg-slate-900 text-white p-3 rounded border border-sky-500/50 text-xs font-mono focus:outline-none focus:border-sky-400" />
                </div>
                
                <button onClick={acceptAnswer} disabled={!remoteSdp} className="px-10 py-3 bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-500 hover:to-indigo-500 disabled:opacity-50 text-white font-bold rounded-lg shadow-lg text-lg w-full">
                  接続を確立する
                </button>
                <button onClick={() => setSignalingStep(0)} className="text-slate-400 hover:text-white underline mt-6 text-sm">◀ 戻る</button>
              </div>
            ) : (
              <div className="bg-slate-800/90 p-8 rounded-xl border border-sky-500/50 shadow-[0_0_20px_rgba(14,165,233,0.2)] backdrop-blur flex flex-col items-center mt-4 w-full max-w-2xl relative">
                <h3 className="text-2xl text-sky-400 font-bold mb-4">部屋に参加</h3>
                
                {signalingStep === 1 ? (
                  <>
                    <p className="text-slate-300 text-sm mb-6 text-center leading-relaxed">
                      ホストから受け取った「招待コード」を貼り付けてください。<br/>
                      回答コードを生成します。
                    </p>
                    <div className="w-full mb-8">
                      <label className="text-sm font-bold text-yellow-400 mb-2 block">ホストの招待コード を入力</label>
                      <textarea value={remoteSdp} onChange={e => setRemoteSdp(e.target.value)} placeholder="ここに招待コードを貼り付けます" className="w-full h-32 bg-slate-900 text-white p-3 rounded border border-yellow-500/50 text-xs font-mono focus:outline-none focus:border-yellow-400" />
                    </div>
                    <button onClick={createAnswer} disabled={!remoteSdp} className="px-10 py-3 bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 hover:to-orange-500 disabled:opacity-50 text-white font-bold rounded-lg shadow-lg text-lg w-full">
                      回答コードを生成
                    </button>
                    <button onClick={() => setSignalingStep(0)} className="text-slate-400 hover:text-white underline mt-6 text-sm">◀ 戻る</button>
                  </>
                ) : (
                  <>
                    <p className="text-slate-300 text-sm mb-6 text-center leading-relaxed">
                      生成された「回答コード」をコピーしてホストに渡してください。<br/>
                      ホストが接続を確立するまでこのままお待ちください。
                    </p>
                    <div className="w-full mb-8 relative">
                      <div className="flex justify-between items-end mb-2">
                        <label className="text-sm font-bold text-slate-400">あなたの回答コード (ホストに渡す)</label>
                        <button onClick={() => copyToClipboard(localSdp)} className={`text-xs px-3 py-1 rounded transition-colors ${copiedText ? 'bg-green-600 text-white' : 'bg-slate-700 hover:bg-slate-600 text-white'}`}>
                          {copiedText ? '✅ コピー完了' : '📋 コピーする'}
                        </button>
                      </div>
                      <textarea readOnly value={localSdp || 'コード生成中...'} className="w-full h-32 bg-slate-900 text-slate-300 p-3 rounded border border-slate-600 text-xs font-mono focus:outline-none" />
                      {!localSdp && <div className="absolute inset-0 flex items-center justify-center bg-slate-900/50 rounded mt-6"><span className="animate-spin text-2xl">⏳</span></div>}
                    </div>
                    <div className="text-sky-300 animate-pulse text-lg flex items-center gap-2 mt-4 font-bold tracking-widest">
                      <span className="animate-spin inline-block">⏳</span> 接続確立を待機中...
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        );
      }

      if (phase === 'WAITING_ROOM') {
        return (
          <div className="w-full h-screen flex flex-col items-center justify-center font-sans text-white" style={{ backgroundImage: BACKGROUNDS.sunny, backgroundSize: 'cover', backgroundPosition: 'center', boxShadow: 'inset 0 0 0 2000px rgba(15, 23, 42, 0.85)' }}>
            <h2 className="text-4xl font-black text-green-400 mb-6 drop-shadow-lg flex items-center gap-3">✅ 通信接続完了！</h2>
            <p className="text-xl mb-10 text-slate-300">P2Pネットワークによる直接通信が確立されました。</p>
            
            <div className="bg-slate-800/80 p-6 rounded-xl border border-slate-500 shadow-xl backdrop-blur w-96 mb-10">
              <h3 className="text-lg text-slate-300 mb-4 font-bold border-b border-slate-600 pb-2">参加メンバー ({gameData?.playerUids?.length} / {gameData?.playerCount})</h3>
              <ul className="space-y-3">
                {gameData?.playerUids?.map((uid, i) => (
                  <li key={uid} className="bg-slate-900/50 px-4 py-3 rounded-lg flex justify-between items-center border border-slate-700">
                    <div className="flex items-center gap-3">
                      <div className="w-4 h-4 rounded-full" style={{backgroundColor: COLORS.players[gameData.players[uid]]}}></div>
                      <span className="font-bold text-lg">派閥 {gameData.players[uid]} {uid === myUid ? '(あなた)' : ''}</span>
                    </div>
                    {gameData.hostUid === uid && <span className="text-yellow-400 text-xs font-black bg-yellow-900/50 px-2 py-1 rounded">HOST</span>}
                  </li>
                ))}
              </ul>
            </div>

            {gameMode === 'HOST' ? (
              <button onClick={startGame} className="px-12 py-5 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-black text-2xl rounded-xl shadow-2xl transition-all hover:-translate-y-1">
                ゲーム開始 (空き枠はAIが担当)
              </button>
            ) : (
              <div className="flex items-center gap-3 text-slate-400 text-lg animate-pulse">
                ⏳ ホストが開始するのを待っています...
              </div>
            )}
          </div>
        );
      }

      const currentDayIndex = gameState ? (gameState.turn - 1) % 7 : 0;

      return (
        <div className="w-full h-screen flex flex-col items-center justify-center font-sans select-none text-white" style={{ background: '#0f172a' }}>
          
          <div className="absolute top-0 w-full max-w-5xl p-4 flex justify-between items-center z-10 pointer-events-none">
            <div className="flex flex-col gap-2 pointer-events-auto">
              <div className="flex gap-3">
                {Array.from({length: gameState.playerCount}).map((_, i) => {
                  const p = i + 1; const isAlive = gameState.alivePlayers.includes(p);
                  return (
                    <div key={p} className={`px-4 py-2 rounded-lg flex items-center gap-2 border transition-all ${isAlive ? 'opacity-100' : 'opacity-30 grayscale'}`} style={{ borderColor: COLORS.players[p], backgroundColor: `${COLORS.players[p]}33` }}>
                      <span style={{fontSize: '18px'}}>{p === myPlayerNum ? '🛡️' : '👥'}</span>
                      <span className="font-bold text-sm">{p === myPlayerNum ? '自派閥' : `派閥 ${p}`}</span>
                    </div>
                  );
                })}
              </div>
              {(phase === 'INPUT' || phase === 'WAITING_FOR_OTHERS') && gameState.alivePlayers.includes(myPlayerNum) && gameState.chips[myPlayerNum].length > 0 && (
                <div className="flex gap-2">
                  {gameState.chips[myPlayerNum].map((chipId, idx) => {
                    const isUsed = playerCommands.some(c => c.type === 'use_chip' && c.chipIdx === idx);
                    const usedCount = playerCommands.filter(c => c.type === 'use_chip').length;
                    const isDisabled = isUsed || (!isUsed && usedCount >= 2) || phase !== 'INPUT';
                    const isSelected = selectedChip?.idx === idx;
                    const info = CHIP_TYPES[chipId];
                    const imgSrc = loadedImages[info.imgKey]?.src;

                    return (
                      <div key={idx} className="relative group">
                        <button onClick={() => !isDisabled && handleChipSelect(chipId, idx)} disabled={isDisabled && !isSelected} className={`flex items-center gap-1 px-2 py-1 rounded text-xs border transition-all ${isUsed ? 'bg-slate-700 text-slate-500 border-slate-600' : isSelected ? 'bg-indigo-600 text-white border-indigo-400 animate-pulse' : isDisabled ? 'bg-slate-800 text-slate-600 border-slate-700 opacity-50' : 'bg-slate-800 text-indigo-300 border-indigo-500 hover:bg-indigo-900'}`}>
                          {imgSrc ? <img src={imgSrc} alt={info.name} className="w-4 h-4 object-contain" /> : <span>{info.icon}</span>}
                          {info.name}
                        </button>
                        <div className="absolute top-full mt-2 left-1/2 transform -translate-x-1/2 hidden group-hover:block bg-slate-900/95 text-slate-200 text-xs px-3 py-2 rounded-lg border border-indigo-500/50 whitespace-nowrap z-50 shadow-[0_0_10px_rgba(99,102,241,0.2)] pointer-events-none">
                          <div className="font-bold text-indigo-300 mb-1 flex items-center gap-1">
                            {imgSrc ? <img src={imgSrc} alt={info.name} className="w-4 h-4 object-contain" /> : <span>{info.icon}</span>} {info.name}
                          </div>
                          <div className="text-slate-300">{info.desc}</div>
                        </div>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
            
            <div className="flex flex-col items-end gap-2">
              {gameMode !== 'SOLO' && <div className="text-green-400 font-mono text-sm bg-slate-800/80 px-3 py-1 rounded border border-green-600/50 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>P2P CONNECTED</div>}
              <div className="flex items-center gap-4 bg-slate-800 border border-slate-600 px-5 py-2 rounded-full shadow-lg">
                <div className="flex items-center gap-2 text-slate-300">
                  <span className="text-sky-400">📅</span> <span className="font-bold text-lg">{gameState.turn}日目 ({DAYS[currentDayIndex]})</span>
                </div>
                <div className="flex items-center gap-2 text-slate-300 border-l border-slate-600 pl-4">
                  {renderWeatherIcon(gameState.weather, 'w-6 h-6', loadedImages)} <span className="font-bold">{getWeatherName(gameState.weather)}</span>
                </div>
                <div className="flex items-center gap-2 text-slate-500 border-l border-slate-600 pl-4 text-xs">
                  明日: {renderWeatherIcon(gameState.forecast, 'w-4 h-4', loadedImages)}
                </div>
                <div className="flex items-center gap-2 text-lime-400 border-l border-slate-600 pl-4 text-sm font-bold">
                  🗑️ 回収日: {DAYS[gameState.trashDays[0]]}・{DAYS[gameState.trashDays[1]]}
                </div>
              </div>
            </div>
          </div>

          <div className="relative border-y border-slate-700 shadow-2xl rounded-xl overflow-hidden mt-8" style={{ width: MAP_W, height: MAP_H, backgroundImage: gameState ? BACKGROUNDS[gameState.weather] : BACKGROUNDS.sunny, backgroundSize: 'cover', backgroundPosition: 'center' }}>
            <canvas ref={canvasRef} width={MAP_W} height={MAP_H} onClick={handleCanvasClick} onMouseMove={handleCanvasMouseMove} className={`absolute top-0 left-0 ${phase==='INPUT' ? 'cursor-crosshair' : ''}`} />
            
            {renderMenu()}
            {renderTargetPrompt()}
            {renderSlider()}
            
            {phase === 'ANIMATING' && (
               <div className="absolute top-8 left-1/2 transform -translate-x-1/2 text-white text-xl font-black tracking-widest bg-slate-900/80 border border-yellow-500/50 px-8 py-2 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.3)] z-10">
                 {animRef.current.progress < 0.25 ? 'PHASE 1: 準備 (カット・設備強化)' : 
                  animRef.current.progress < 0.6 ? 'PHASE 2: 輸送 & 襲撃' : 
                  animRef.current.progress < 0.85 ? 'PHASE 3: 解決 (乱戦・ショバ強奪)' : 'PHASE 4: 資源回収・天候効果'}
               </div>
            )}

            {phase === 'WAITING_FOR_OTHERS' && (
              <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-40 pointer-events-auto">
                <span className="text-6xl animate-spin text-sky-400 mb-6 inline-block">⏳</span>
                <h2 className="text-3xl font-black text-white tracking-widest drop-shadow-lg mb-8">他の派閥の行動を待機中...</h2>
                <div className="flex gap-4">
                   {Object.values(gameData?.players || {}).filter(p => gameState.alivePlayers.includes(p)).map(p => {
                     const isReady = gameData?.turnReady?.[p];
                     return (
                       <div key={p} className={`px-6 py-3 rounded-lg border flex flex-col items-center gap-2 shadow-lg transition-colors ${isReady ? 'bg-sky-600/80 border-sky-400 text-white' : 'bg-slate-800/80 border-slate-600 text-slate-400'}`}>
                         <span className="font-bold text-lg">派閥 {p}</span><span className="text-sm">{isReady ? '準備完了' : '考慮中...'}</span>
                       </div>
                     );
                   })}
                </div>
              </div>
            )}

            {phase === 'GAME_OVER' && (
              <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center z-50">
                <h1 className="text-7xl font-black mb-6 drop-shadow-lg" style={{ color: gameState.winner ? COLORS.players[gameState.winner] : '#cbd5e1' }}>
                  {gameState.winner === myPlayerNum ? 'VICTORY' : gameState.winner ? `派閥 ${gameState.winner} の勝利` : 'DRAW'}
                </h1>
                {gameState.winner !== myPlayerNum && gameState.winner !== null && <p className="text-red-400 text-2xl font-bold mb-4 tracking-widest">地下帝国 陥落</p>}
                <button onClick={() => window.location.reload()} className="px-10 py-4 bg-white hover:bg-slate-200 text-slate-900 font-bold text-xl rounded-xl mt-6 transition-all shadow-xl">タイトルへ戻る</button>
              </div>
            )}
          </div>

          <div className="w-full max-w-5xl flex gap-6 px-4 mt-6">
            <div className="flex-1 bg-slate-800 border border-slate-700 rounded-xl p-4 h-32 overflow-y-auto relative">
              <h3 className="text-slate-400 text-sm font-bold mb-2 flex items-center justify-between">
                <div className="flex items-center gap-2">🪙 行動予定 (1ショバにつき1行動)</div>
              </h3>
              {!gameState?.alivePlayers.includes(myPlayerNum) && (phase === 'INPUT' || phase === 'WAITING_FOR_OTHERS') ? (
                 <div className="text-red-400 text-sm">あなたの派閥は全滅しました。観戦モードです。</div>
              ) : (
                <div className="flex flex-wrap gap-2">
                  {playerCommands.map((cmd, idx) => (
                    <div key={idx} className={`border rounded px-3 py-1.5 flex items-center gap-3 text-sm shadow ${cmd.type === 'use_chip' ? 'bg-indigo-900/50 border-indigo-500 text-indigo-200' : 'bg-slate-700 border-slate-600 text-white'}`}>
                      {cmd.type === 'move' && (() => {
                         const isStealth = playerCommands.some(c => c.type === 'use_chip' && c.chip === 'STEALTH' && c.targetId === cmd.nodeId);
                         return <><span className="text-sky-400">➡️</span> {cmd.nodeId} → {cmd.targetId} ({cmd.amount}) {isStealth && '(隠密)'}</>;
                      })()}
                      {cmd.type === 'toggle_mode' && <><span className="text-purple-400">📡</span> {cmd.nodeId} 遠隔切替</>}
                      {cmd.type === 'upgrade' && <><span className="text-emerald-400">⛺</span> {cmd.nodeId} 設備強化</>}
                      {cmd.type === 'cut' && <><span className="text-red-400">✂️</span> {cmd.nodeId}-{cmd.targetId} 切断</>}
                      {cmd.type === 'use_chip' && (() => {
                        const info = CHIP_TYPES[cmd.chip];
                        const imgSrc = loadedImages[info.imgKey]?.src;
                        return (
                          <>
                            {imgSrc ? <img src={imgSrc} className="w-4 h-4 object-contain"/> : <span className="text-indigo-400">{info.icon}</span>}
                            {info.name} {cmd.targetId && `-> ${cmd.targetId}`}
                          </>
                        );
                      })()}
                      {phase === 'INPUT' && <button onClick={() => removeCommand(cmd)} className="text-slate-400 hover:text-white ml-2">❌</button>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button onClick={handleLockIn} disabled={phase !== 'INPUT'} className="w-64 bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 disabled:from-slate-700 disabled:to-slate-700 disabled:text-slate-500 text-white font-black text-xl rounded-xl transition-all flex items-center justify-center gap-3 shadow-lg">
              <span className="text-2xl">▶️</span> {gameState?.alivePlayers.includes(myPlayerNum) ? '行動確定' : '待機中'}
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NodeWars />);
  </script>
</body>
</html>
