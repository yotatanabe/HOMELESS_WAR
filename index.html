  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MAP_W = 900;
    const MAP_H = 600;

    const COLORS = {
      bg: '#0f172a', edge: '#cbd5e1', neutral: '#64748b', dump: '#84cc16',     
      players: ['#64748b', '#0ea5e9', '#ef4444', '#22c55e', '#eab308'],

    const BACKGROUNDS = {
      sunny: 'url("https://images.unsplash.com/photo-1496350369888-297ebcc02052?auto=format&fit=crop&q=80&w=900&h=600")',
      typhoon: 'url("https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?auto=format&fit=crop&q=80&w=900&h=600")',

    const ASSETS = {
      station: './assets/station.png', bench: './assets/bench.png',
      underpass: './assets/underpass.png', ruin: './assets/ruin.png',
      dump: './assets/dump.png', item: './assets/item_box.png',
      chip_emp: './assets/chip_emp.png', chip_stealth: './assets/chip_stealth.png',
      chip_boost: './assets/chip_boost.png', chip_mine: './assets/chip_mine.png',
      chip_atk: './assets/chip_atk.png', chip_sabotage: './assets/chip_sabotage.png',
      weather_sunny: './assets/weather_sunny.png', weather_typhoon: './assets/weather_typhoon.png',
      weather_cold: './assets/weather_cold.png',
    };

    const CHIP_TYPES = {
      EMP: { id: 'EMP', name: 'カラスの死骸', desc: '敵のカットを無効化', imgKey: 'chip_emp', icon: '🦅' },
      STEALTH: { id: 'STEALTH', name: '段ボール擬態', desc: '移動ラインを隠す', imgKey: 'chip_stealth', icon: '🥷' },
      BOOST: { id: 'BOOST', name: '台車ダッシュ', desc: '1T遠隔ロス0', imgKey: 'chip_boost', icon: '🛒' },
      MINE_BOOST: { id: 'MINE_BOOST', name: '炊き出しの噂', desc: '1T選択ノードの採掘量x2', imgKey: 'chip_mine', icon: '🍲' },
      ATK_BOOST: { id: 'ATK_BOOST', name: '拾った酒', desc: '1T選択ノードの輸送量x2', imgKey: 'chip_atk', icon: '🍶' },
      SABOTAGE: { id: 'SABOTAGE', name: 'サツの巡回', desc: '1T敵ノードの採掘停止', imgKey: 'chip_sabotage', icon: '🚓' }
    };

    const SHOBA_INFO = {
      station: { name: '駅の隅っこ', radius: 35, imgKey: 'station' },
      bench: { name: '公園のベンチ', radius: 20, imgKey: 'bench' },
      underpass: { name: '高架下', radius: 28, imgKey: 'underpass' },
      ruin: { name: '廃ビル', radius: 32, imgKey: 'ruin' },
      dump: { name: 'ゴミ捨て場', radius: 32, imgKey: 'dump' },
    };

    const SHOBA_EMOJI = { station: '🚉', bench: '🪑', underpass: '🌉', ruin: '🏚️', dump: '🗑️' };
    const DAYS = ['月', '火', '水', '木', '金', '土', '日'];

    const TUTORIAL_SLIDES = [
      { title: "👑 地下帝国のドンを目指せ", icon: "⛺", content: "お前は路上を生き抜く派閥のリーダーだ。他の派閥と「ショバ（居場所）」を奪い合い、自分以外のすべての派閥を街から追い出せば勝利となる。\nショバにある数字は「資源（空き缶や仲間の数）」だ。この資源を他のショバに送り込んで、襲撃や防衛を行うんだ。" },
      { title: "🛒 カチコミと移動", icon: "➡️", content: "自分のショバをクリックするとメニューが開く。\n「輸送」を選び、隣接するショバを選択して送り込む資源の量を決めろ。\n全員が行動を「確定」すると、一斉に移動と乱闘が始まる【同時ターン制】だ。相手の裏をかけ！" },
      { title: "🔨 設備の強化 と ✂️ 通行止め", icon: "🛠️", content: "【設備強化】: 30資源を消費してショバを強化（ブルーシート→トタン→プレハブ）できる。最大蓄積量と毎ターンの資源回収量が増えるぞ。\n【カット】: 10資源を消費して、指定した道を1ターンの間「通行止め」にする。バリケードを築いて敵のカチコミを防ぐ防衛の要だ。" },
      { title: "📡 遠隔モード (出稼ぎ)", icon: "📡", content: "「遠隔切替」を行うと、そのショバでの毎ターンの資源回収が止まる代わりに、2マス先まで（一方通行を無視して）一気にカチコミに行けるようになる。\nただし、2マス先への遠征は道中で資源を落とす「ロス（減衰）」が発生する。ショバのレベルを上げればロスは減るぜ。" },
      { title: "🗑️ ゴミの日 と 📦 謎の段ボール", icon: "🗑️", content: "【ゴミ捨て場】は普段はただの空き地だが、「ゴミの日（火曜・金曜など）」になると大量の資源が不法投棄される宝の山になる！\nまた、定期的にマップに現れる【謎の段ボール】を攻撃して体力を0にすると、戦局をひっくり返す「強力なアイテム」を拾えるぞ。" },
      { title: "⚔️ 血みどろの乱戦", icon: "⚔️", content: "複数の派閥が同じショバにカチコミをかけると、入り乱れての「大乱戦」に発展する。\nお互いの資源がランダムに削り合いとなり、最後まで立っていた（資源が多かった）派閥がそのショバをぶんどる仕組みだ。\n「拾った酒」で攻撃力を倍増させるなど、アイテムを汚く使って勝ち残れ！" }
    ];

    const PLAYABLE_TUTORIALS = [
      {
        id: 1, title: "STAGE 1: 路上デビュー", message: "まずは隣の中立拠点（公園のベンチ）を占領してみよう。\n自分の拠点（駅の隅っこ）をクリックして【輸送】を選び、隣の拠点をクリックだ。\n送る量を決めたら右下の【行動確定】を押せ！", allowedActions: ['move'],
        setup: () => ({ nodes: [{ id: 1, x: 250, y: 300, owner: 1, energy: 50, maxEnergy: 100, generation: 10, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }, { id: 2, x: 650, y: 300, owner: 0, energy: 10, maxEnergy: 50, generation: 5, type: 'normal', shobaType: 'bench', level: 1, mode: 'normal' }], edges: [{ s: 1, t: 2, isOneWay: false }], playerCount: 1 }),
        cpuLogic: () => [], checkWin: (state) => state.nodes.find(n => n.id === 2)?.owner === 1
      },
      {
        id: 2, title: "STAGE 2: 縄張り争い", message: "右側に敵の派閥がうろついている。相手の拠点にカチコミをかけて奪い取れ！\n相手より多くの資源（エネルギー）を送り込めば勝てるぞ。", allowedActions: ['move'],
        setup: () => ({ nodes: [{ id: 1, x: 250, y: 300, owner: 1, energy: 60, maxEnergy: 100, generation: 10, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }, { id: 2, x: 650, y: 300, owner: 2, energy: 20, maxEnergy: 100, generation: 5, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }], edges: [{ s: 1, t: 2, isOneWay: false }], playerCount: 2 }),
        cpuLogic: () => [], checkWin: (state) => state.nodes.find(n => n.id === 2)?.owner === 1 || !state.alivePlayers.includes(2)
      },
      {
        id: 3, title: "STAGE 3: 地盤固め", message: "資源が30以上溜まると【設備強化】ができる。\nレベルを上げると最大備蓄量と毎ターンの回復量が増えるぞ。\nターンを進めて資源を貯め、自分の拠点をLv2（トタン屋根）にしてみよう。", allowedActions: ['upgrade', 'move'],
        setup: () => ({ nodes: [{ id: 1, x: 450, y: 300, owner: 1, energy: 10, maxEnergy: 100, generation: 10, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }], edges: [], playerCount: 1 }),
        cpuLogic: () => [], checkWin: (state) => state.nodes.find(n => n.id === 1)?.level >= 2
      },
      {
        id: 4, title: "STAGE 4: 鉄壁の防衛", message: "敵の大群が毎ターン攻めてくる！\n【カット(✂️)】を使って道を1ターン封鎖し、相手の攻撃をやり過ごせ。\nコストは10かかるが、防衛の要だ。3ターン耐え抜くか、敵を倒せばクリアだ。", allowedActions: ['move', 'upgrade', 'cut'],
        setup: () => ({ nodes: [{ id: 1, x: 250, y: 300, owner: 1, energy: 40, maxEnergy: 100, generation: 10, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }, { id: 2, x: 650, y: 300, owner: 2, energy: 100, maxEnergy: 200, generation: 15, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }], edges: [{ s: 1, t: 2, isOneWay: false }], playerCount: 2 }),
        cpuLogic: (state) => { const cmds = []; const enemyNode = state.nodes.find(n => n.id === 2); if (enemyNode && enemyNode.energy > 20) { cmds.push({ type: 'move', nodeId: 2, targetId: 1, amount: 20, playerId: 2 }); } return cmds; },
        checkWin: (state) => state.turn > 3 || state.nodes.find(n => n.id === 2)?.owner === 1
      },
      {
        id: 5, title: "STAGE 5: 出稼ぎとアイテム", message: "【遠隔切替(📡)】をすると、回復が止まる代わりに2マス先までカチコミできる。ただし輸送ロス（半減）があるぞ。\n上の謎の段ボールを壊して「攻撃力倍増」アイテムを取り、遠くにいる敵を倒せ！", allowedActions: ['move', 'upgrade', 'cut', 'toggle_mode', 'use_chip'],
        setup: () => ({ nodes: [{ id: 1, x: 150, y: 300, owner: 1, energy: 80, maxEnergy: 100, generation: 10, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }, { id: 2, x: 450, y: 300, owner: 0, energy: 50, maxEnergy: 50, generation: 5, type: 'normal', shobaType: 'underpass', level: 1, mode: 'normal' }, { id: 3, x: 750, y: 300, owner: 2, energy: 30, maxEnergy: 100, generation: 5, type: 'base', shobaType: 'station', level: 1, mode: 'normal' }, { id: 4, x: 450, y: 150, owner: 0, energy: 5, maxEnergy: 10, generation: 0, type: 'item', item: 'ATK_BOOST', level: 1, mode: 'normal' }], edges: [{ s: 1, t: 2, isOneWay: false }, { s: 2, t: 3, isOneWay: false }, { s: 2, t: 4, isOneWay: false }], playerCount: 2 }),
        cpuLogic: () => [], checkWin: (state) => state.nodes.find(n => n.id === 3)?.owner === 1 || !state.alivePlayers.includes(2)
      }
    ];

    const generateWeather = () => { const r = Math.random(); if (r < 0.2) return 'typhoon'; if (r < 0.4) return 'cold'; return 'sunny'; };
    const getWeatherName = (weather) => { if (weather === 'typhoon') return '台風 (遠隔ロス増大)'; if (weather === 'cold') return '大寒波 (Lv1拠点ダメージ)'; return '晴れ'; };
    const renderWeatherIcon = (weather, sizeClass='w-6 h-6', imagesObj={}) => {
      const key = `weather_${weather}`; if (imagesObj[key]) return <img src={imagesObj[key].src} alt={weather} className={`${sizeClass} object-contain inline-block`} />;
      if (weather === 'typhoon') return <span className="text-yellow-400">⛈️</span>; if (weather === 'cold') return <span className="text-cyan-300">❄️</span>; return <span className="text-orange-400">☀️</span>;
    };

    const intersects = (a, b, c, d) => {
      const ccw = (p1, p2, p3) => (p3.y - p1.y) * (p2.x - p1.x) > (p2.y - p1.y) * (p3.x - p1.x);
      if (a.x === c.x && a.y === c.y) return false; if (a.x === d.x && a.y === d.y) return false; if (b.x === c.x && b.y === c.y) return false; if (b.x === d.x && b.y === d.y) return false;
      return ccw(a, c, d) !== ccw(b, c, d) && ccw(a, b, c) !== ccw(a, b, d);
    };

    const getDistance = (n1, n2) => Math.sqrt(Math.pow(n1.x - n2.x, 2) + Math.pow(n1.y - n2.y, 2));

    const canMove = (id1, id2, edges, cutEdges = [], ignoreOneWay = false) => {
      return edges.some(e => {
        const isCut = cutEdges.some(ce => (ce.s === e.s && ce.t === e.t) || (ce.s === e.t && ce.t === e.s));
        if (isCut) return false;
        if (e.isOneWay && !ignoreOneWay) return e.s === id1 && e.t === id2;
        return (e.s === id1 && e.t === id2) || (e.s === id2 && e.t === id1);
      });
    };

    const getHopDistance = (id1, id2, edges, cutEdges = [], ignoreOneWay = false) => {
      if (id1 === id2) return 0;
      if (canMove(id1, id2, edges, cutEdges, ignoreOneWay)) return 1;
      const neighbors = [];
      edges.forEach(e => {
        const isCut = cutEdges.some(ce => (ce.s === e.s && ce.t === e.t) || (ce.s === e.t && ce.t === e.s));
        if (isCut) return;
        if (e.s === id1) neighbors.push(e.t);
        else if (e.t === id1 && (!e.isOneWay || ignoreOneWay)) neighbors.push(e.s);
      });
      for (const n of neighbors) { if (canMove(n, id2, edges, cutEdges, ignoreOneWay)) return 2; }
      return Infinity;
    };

    const getTargetableNodes = (startId, nodes, edges, maxHops, ignoreOneWay = false) => {
      return nodes.filter(n => n.id !== startId && getHopDistance(startId, n.id, edges, [], ignoreOneWay) <= maxHops);
    };

    const getVisibleNodes = (playerId, nodes, edges) => {
      const visible = new Set();
      nodes.forEach(n => {
        if (n.owner === playerId) {
          visible.add(n.id);
          const neighbors1 = new Set();
          edges.forEach(e => { if (e.s === n.id) neighbors1.add(e.t); if (e.t === n.id) neighbors1.add(e.s); });
          neighbors1.forEach(neighborId => visible.add(neighborId));
          if (n.mode === 'long_range') {
            neighbors1.forEach(neighborId => { edges.forEach(e => { if (e.s === neighborId) visible.add(e.t); if (e.t === neighborId) visible.add(e.s); }); });
          }
        }
      });
      return visible;
    };

    const getLossRate = (level, weather) => {
      let rate = 0;
      if (level === 1) rate = 0.5; else if (level === 2) rate = 0.3; else if (level === 3) rate = 0.1; 
      if (weather === 'typhoon') rate = Math.min(0.9, rate + 0.4); 
      return rate;
    };

    const getLevelName = (level) => { if (level === 1) return 'ブルーシート'; if (level === 2) return 'トタン屋根'; if (level === 3) return 'プレハブ'; return ''; };

    const spawnItem = (mapData) => {
      const { nodes, edges } = mapData;
      let x, y, valid = false, attempts = 0;
      while (!valid && attempts < 100) { x = 100 + Math.random() * 700; y = 100 + Math.random() * 400; valid = nodes.every(n => Math.sqrt(Math.pow(x - n.x, 2) + Math.pow(y - n.y, 2)) > 70); attempts++; }
      if (!valid) return;
      const newId = Math.max(...nodes.map(n => n.id)) + 1;
      const itemType = Object.keys(CHIP_TYPES)[Math.floor(Math.random() * Object.keys(CHIP_TYPES).length)];
      const newItem = { id: newId, x, y, owner: 0, energy: 5, maxEnergy: 5, generation: 0, type: 'item', level: 1, mode: 'normal', item: itemType };
      nodes.push(newItem);
      const potentialEdges = nodes.filter(n => n.id !== newId).map(n => ({ t: n.id, dist: Math.sqrt(Math.pow(newItem.x - n.x, 2) + Math.pow(newItem.y - n.y, 2)), n })).filter(e => e.dist < 250).sort((a, b) => a.dist - b.dist);
      let connections = 0;
      for (const edge of potentialEdges) {
        if (connections >= 2) break; 
        let hasIntersection = false;
        for (const e of edges) {
          const e_n1 = nodes.find(n => n.id === e.s); const e_n2 = nodes.find(n => n.id === e.t);
          if (e_n1 && e_n2 && intersects(newItem, edge.n, e_n1, e_n2)) { hasIntersection = true; break; }
        }
        if (!hasIntersection) { edges.push({ s: edge.t, t: newItem.id, isOneWay: Math.random() < 0.4 }); connections++; }
      }
    };

    const generateMap = (playerCount) => {
      const nodes = [], bases = [];
      if (playerCount === 2) bases.push({ x: 150, y: 300 }, { x: 750, y: 300 });
      else if (playerCount === 3) bases.push({ x: 450, y: 100 }, { x: 200, y: 450 }, { x: 700, y: 450 });
      else bases.push({ x: 150, y: 150 }, { x: 750, y: 150 }, { x: 150, y: 450 }, { x: 750, y: 450 });

      for (let i = 1; i <= playerCount; i++) nodes.push({ id: i, x: bases[i-1].x, y: bases[i-1].y, owner: i, energy: 100, maxEnergy: 200, generation: 10, type: 'base', shobaType: 'station', level: 1, mode: 'normal' });

      let idCounter = 5; 
      for (let i = 0; i < 12 + (playerCount * 2); i++) {
        let x, y, valid = false, attempts = 0;
        while (!valid && attempts < 200) { x = 100 + Math.random() * 700; y = 100 + Math.random() * 400; valid = nodes.every(n => Math.sqrt(Math.pow(x - n.x, 2) + Math.pow(y - n.y, 2)) > 75); attempts++; }
        const isDump = i < 2; let shobaType = 'bench', energy = 0, maxEnergy = 0, generation = 0;
        if (isDump) { shobaType = 'dump'; energy = 10; maxEnergy = 500; generation = 0; } 
        else {
          const rand = Math.random();
          if (rand < 0.6) { shobaType = 'bench'; energy = Math.floor(Math.random() * 11) + 10; maxEnergy = 30; generation = 3; } 
          else if (rand < 0.9) { shobaType = 'underpass'; energy = Math.floor(Math.random() * 16) + 20; maxEnergy = 60; generation = 6; } 
          else { shobaType = 'ruin'; energy = Math.floor(Math.random() * 21) + 30; maxEnergy = 100; generation = 10; }
        }
        nodes.push({ id: idCounter++, x, y, owner: 0, energy, maxEnergy, generation, type: isDump ? 'dump' : 'normal', shobaType, level: 1, mode: 'normal' });
      }

      const edges = [], potentialEdges = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) potentialEdges.push({ s: nodes[i].id, t: nodes[j].id, dist: Math.sqrt(Math.pow(nodes[i].x - nodes[j].x, 2) + Math.pow(nodes[i].y - nodes[j].y, 2)), n1: nodes[i], n2: nodes[j] });
      }
      potentialEdges.sort((a, b) => a.dist - b.dist);
      for (const edge of potentialEdges) {
        if (edge.dist > 350) continue; if (edge.dist > 150 && Math.random() < 0.4) continue;
        const n1Edges = edges.filter(e => e.s === edge.n1.id || e.t === edge.n1.id).length; const n2Edges = edges.filter(e => e.s === edge.n2.id || e.t === edge.n2.id).length;
        if (n1Edges >= 4 || n2Edges >= 4) continue;
        let hasIntersection = false;
        for (const e of edges) {
          const e_n1 = nodes.find(n => n.id === e.s); const e_n2 = nodes.find(n => n.id === e.t);
          if (e_n1 && e_n2 && intersects(edge.n1, edge.n2, e_n1, e_n2)) { hasIntersection = true; break; }
        }
        if (!hasIntersection) edges.push({ s: edge.s, t: edge.t, isOneWay: Math.random() < 0.25 });
      }

      const visited = new Set();
      const dfs = (id) => { if (visited.has(id)) return; visited.add(id); edges.forEach(e => { if (e.s === id) dfs(e.t); if (e.t === id) dfs(e.s); }); };
      dfs(1); if (visited.size < nodes.length) return generateMap(playerCount); 
      const mapData = { nodes, edges }; spawnItem(mapData); return mapData;
    };

    const generateCpuCommands = (state, cpuPlayers) => {
      let cmds = [];
      for (const p of cpuPlayers) {
        if (!state.alivePlayers.includes(p)) continue;
        let usedChipsCount = 0; const pChips = [...state.chips[p]];
        const tryUseChip = (chipType, targetId, playerId) => {
          if (usedChipsCount >= 2) return false; const idx = pChips.indexOf(chipType);
          if (idx !== -1 && !cmds.some(c => c.type === 'use_chip' && c.chip === chipType && c.targetId === targetId)) {
            cmds.push({ type: 'use_chip', chip: chipType, targetId, playerId, chipIdx: idx }); pChips[idx] = null; usedChipsCount++; return true;
          }
          return false;
        };
        const myNodes = state.nodes.filter(n => n.owner === p);
        if (pChips.includes('MINE_BOOST')) {
          const bestMineNode = myNodes.filter(n => n.mode === 'normal').sort((a, b) => b.generation - a.generation)[0];
          if (bestMineNode) tryUseChip('MINE_BOOST', bestMineNode.id, p);
        }
        if (pChips.includes('SABOTAGE')) {
          const bestSabotageNode = state.nodes.filter(n => n.owner !== p && n.owner !== 0 && n.type !== 'item' && n.mode === 'normal').sort((a, b) => b.generation - a.generation)[0];
          if (bestSabotageNode) tryUseChip('SABOTAGE', bestSabotageNode.id, p);
        }
        myNodes.forEach(node => {
          if (node.energy < 10) return; 
          const ignoreOneWay = node.mode === 'long_range';
          const adjNodes = getTargetableNodes(node.id, state.nodes, state.edges, 1, ignoreOneWay);
          const dist2Nodes = getTargetableNodes(node.id, state.nodes, state.edges, 2, ignoreOneWay);
          const threats = adjNodes.filter(n => n.owner !== p && n.owner !== 0 && n.type !== 'item' && n.energy > node.energy + 20);
          if (threats.length > 0 && node.energy >= 10 && Math.random() < 0.7) {
            threats.sort((a, b) => b.energy - a.energy); cmds.push({ type: 'cut', nodeId: node.id, targetId: threats[0].id, playerId: p });
            if (pChips.includes('EMP')) tryUseChip('EMP', threats[0].id, p); return; 
          }
          if (node.level < 3 && node.energy >= 60 && threats.length === 0) { cmds.push({ type: 'upgrade', nodeId: node.id, playerId: p }); return; }
          const hasAdjTarget = adjNodes.some(n => n.owner !== p); const hasDist2Target = dist2Nodes.some(n => n.owner !== p && !adjNodes.find(an => an.id === n.id));
          if (node.mode === 'normal') { if (!hasAdjTarget && hasDist2Target && Math.random() < 0.8) { cmds.push({ type: 'toggle_mode', nodeId: node.id, playerId: p }); return; } } 
          else if (node.mode === 'long_range') { if (hasAdjTarget || !hasDist2Target) { cmds.push({ type: 'toggle_mode', nodeId: node.id, playerId: p }); return; } }
          if (node.energy < 20) return; 
          const hops = node.mode === 'long_range' ? 2 : 1; const targets = hops === 1 ? adjNodes : dist2Nodes; const validTargets = targets.filter(n => n.owner !== p);
          if (validTargets.length > 0) {
            const scoredTargets = validTargets.map(t => {
              let score = 0;
              if (t.type === 'item') score += 1000; else if (t.type === 'dump') score += 900; 
              else if (t.owner === 0) score += 500 - t.energy; else if (t.type === 'base') score += 800 - t.energy; else score += 300 - t.energy; 
              const requiredEnergy = hops === 2 ? t.energy / (1 - getLossRate(node.level, state.weather)) : t.energy;
              if (node.energy > requiredEnergy) score += 200; 
              return { target: t, score };
            });
            scoredTargets.sort((a, b) => b.score - a.score); const bestTarget = scoredTargets[0].target;
            let amount = Math.floor(node.energy * 0.5); let required = bestTarget.energy + 5;
            if (hops === 2) required = Math.ceil(required / (1 - getLossRate(node.level, state.weather)));
            if (node.energy > required && required > amount) amount = required;
            if (pChips.includes('ATK_BOOST') && bestTarget.type !== 'item' && bestTarget.energy > amount) tryUseChip('ATK_BOOST', node.id, p);
            let isStealth = false; if (pChips.includes('STEALTH') && bestTarget.owner !== 0) if (tryUseChip('STEALTH', undefined, p)) isStealth = true;
            cmds.push({ type: 'move', nodeId: node.id, targetId: bestTarget.id, amount, playerId: p, isStealth });
          }
        });
        if (pChips.includes('BOOST')) {
           const hasLongRangeAttack = cmds.some(c => c.type === 'move' && c.playerId === p && state.nodes.find(n=>n.id === c.nodeId)?.mode === 'long_range');
           if (hasLongRangeAttack) tryUseChip('BOOST', undefined, p);
        }
      }
      return cmds;
    };

    const simulateTurn = (state, allCommands) => {
      let next = JSON.parse(JSON.stringify(state));
      let animData = { prep: [], movements: [], combats: [], mines: [], captures: [], items: [], weatherDamages: [], trashBonuses: [] };

      const activeBoosts = new Set(), activeEmps = new Set(), activeMineBoosts = new Set(), activeAtkBoosts = new Set(), activeSabotages = new Set();

      allCommands.forEach(cmd => {
        if (cmd.type === 'use_chip') {
          const pChips = next.chips[cmd.playerId]; const idx = pChips.indexOf(cmd.chip);
          if (idx !== -1) pChips.splice(idx, 1); 
          if (cmd.chip === 'BOOST') activeBoosts.add(cmd.playerId);
          if (cmd.chip === 'EMP') activeEmps.add(cmd.targetId); 
          if (cmd.chip === 'MINE_BOOST') { activeMineBoosts.add(cmd.targetId); animData.prep.push({ type: 'mine_boost', nodeId: cmd.targetId }); }
          if (cmd.chip === 'ATK_BOOST') { activeAtkBoosts.add(cmd.targetId); animData.prep.push({ type: 'atk_boost', nodeId: cmd.targetId }); }
          if (cmd.chip === 'SABOTAGE') { activeSabotages.add(cmd.targetId); animData.prep.push({ type: 'sabotage', nodeId: cmd.targetId }); }
        }
      });

      let cutEdges = [];
      allCommands.forEach(cmd => {
        const node = next.nodes.find(n => n.id === cmd.nodeId);
        if (!node) return;
        if (cmd.type === 'toggle_mode') { node.mode = node.mode === 'normal' ? 'long_range' : 'normal'; animData.prep.push({ type: 'toggle', nodeId: node.id, mode: node.mode }); } 
        else if (cmd.type === 'upgrade' && node.level < 3 && node.energy >= 30) { node.energy -= 30; node.level += 1; node.maxEnergy += 50; node.generation += 5; animData.prep.push({ type: 'upgrade', nodeId: node.id }); } 
        else if (cmd.type === 'cut' && node.energy >= 10) {
          if (!activeEmps.has(node.id)) { node.energy -= 10; cutEdges.push({ s: cmd.nodeId, t: cmd.targetId }); animData.prep.push({ type: 'cut', s: cmd.nodeId, t: cmd.targetId, owner: cmd.playerId }); } 
          else { animData.prep.push({ type: 'emp_block', nodeId: node.id }); }
        }
      });

      const currentDayIndex = (state.turn - 1) % 7;
      const isTrashDay = state.trashDays.includes(currentDayIndex);

      next.nodes.forEach(node => {
        if (state.weather === 'cold' && node.level === 1 && node.owner !== 0 && node.type !== 'item' && node.type !== 'dump') {
           const dmg = Math.min(node.energy, 5);
           if (dmg > 0) { node.energy -= dmg; animData.weatherDamages.push({ nodeId: node.id, amount: dmg }); }
        }
        if (node.owner !== 0 && node.mode === 'normal') {
          if (!activeSabotages.has(node.id)) {
            let gen = node.generation; if (activeMineBoosts.has(node.id)) gen *= 2;
            const added = Math.min(node.maxEnergy - node.energy, gen);
            node.energy += added; if (added > 0) animData.mines.push({ nodeId: node.id, amount: added });
          }
        }
        if (isTrashDay && node.type === 'dump') {
           if (node.owner !== 0) {
             const added = Math.min(node.maxEnergy - node.energy, 80);
             node.energy += added; if (added > 0) animData.trashBonuses.push({ nodeId: node.id, amount: added });
           }
        }
      });

      let inflows = {}; next.nodes.forEach(n => { inflows[n.id] = {}; for(let i=1; i<=state.playerCount; i++) inflows[n.id][i] = 0; });
      let moveRequests = {};
      allCommands.forEach(cmd => { if (cmd.type === 'move') { if (!moveRequests[cmd.nodeId]) moveRequests[cmd.nodeId] = []; moveRequests[cmd.nodeId].push(cmd); } });

      Object.keys(moveRequests).forEach(nodeId => {
        const node = next.nodes.find(n => n.id === parseInt(nodeId));
        if (!node) return;
        const reqs = moveRequests[nodeId];
        const totalReq = reqs.reduce((sum, r) => sum + r.amount, 0);
        reqs.forEach(req => {
          let sentAmount = req.amount; if (totalReq > node.energy) sentAmount = Math.floor(req.amount * (node.energy / totalReq));
          node.energy -= sentAmount;
          let baseReceived = sentAmount; if (activeAtkBoosts.has(req.nodeId)) baseReceived *= 2;
          
          const hops = getHopDistance(node.id, req.targetId, next.edges, cutEdges, node.mode === 'long_range');
          
          let receivedAmount = 0;
          if (hops === 1) { receivedAmount = baseReceived; } 
          else if (hops === 2) { let lossRate = activeBoosts.has(req.playerId) ? 0 : getLossRate(node.level, state.weather); receivedAmount = Math.floor(baseReceived * (1 - lossRate)); }
          if (receivedAmount > 0) { inflows[req.targetId][req.playerId] += receivedAmount; animData.movements.push({ source: req.nodeId, target: req.targetId, amount: receivedAmount, owner: req.playerId, hops }); }
        });
      });

      next.nodes.forEach(node => {
        const nodeInflows = inflows[node.id];
        const originalEnergy = node.energy;
        const originalOwner = node.owner;

        let defEnergy = node.energy;
        
        if (node.owner !== 0 && nodeInflows[node.owner] > 0) {
          defEnergy += nodeInflows[node.owner];
          nodeInflows[node.owner] = 0; 
        }

        let attackers = [];
        for(let i=1; i<=state.playerCount; i++) {
          if(nodeInflows[i] > 0) attackers.push({ p: i, f: nodeInflows[i] });
        }
        
        if(attackers.length === 0) {
          if (defEnergy !== originalEnergy) {
            node.energy = Math.min(node.maxEnergy, defEnergy);
            animData.combats.push({ nodeId: node.id, force: node.energy - originalEnergy, attacker: node.owner, clashAmount: 0 });
          }
          return;
        }

        let clashAmount = 0;
        if (attackers.length > 1) {
           clashAmount = attackers.reduce((sum, a) => sum + a.f, 0) + (defEnergy > 0 ? 10 : 0);
        } else if (attackers.length === 1 && node.owner !== attackers[0].p && node.owner !== 0) {
           clashAmount = attackers[0].f;
        }

        while (defEnergy > 0 && attackers.length > 0) {
            const idx = Math.floor(Math.random() * attackers.length);
            attackers[idx].f -= 1;
            defEnergy -= 1;
            if (attackers[idx].f <= 0) {
                attackers.splice(idx, 1);
            }
        }

        if (defEnergy > 0) {
            node.energy = Math.min(node.maxEnergy, defEnergy);
        } else {
            attackers.sort((a, b) => b.f - a.f);
            
            if (attackers.length === 0) {
                if (node.type === 'item') {
                    node.energy = 0;
                } else {
                    node.owner = 0;
                    node.energy = 0;
                    node.mode = 'normal';
                    animData.captures.push({ nodeId: node.id, newOwner: 0 });
                }
            } else {
                const top = attackers[0];
                const secondForce = attackers.length > 1 ? attackers[1].f : 0;
                const diff = top.f - secondForce; 
                
                if (diff > 0) {
                    if (node.type === 'item') {
                        next.chips[top.p].push(node.item);
                        animData.items.push({ x: node.x, y: node.y, item: node.item, owner: top.p });
                        node.isCollected = true; 
                        node.energy = 0;
                    } else {
                        if (node.owner !== top.p) {
                            node.owner = top.p;
                            node.mode = 'normal';
                            animData.captures.push({ nodeId: node.id, newOwner: top.p });
                        }
                        node.energy = Math.min(node.maxEnergy, diff);
                    }
                } else {
                    if (node.type !== 'item') {
                        node.owner = 0;
                        node.energy = 0;
                        node.mode = 'normal';
                        animData.captures.push({ nodeId: node.id, newOwner: 0 });
                    }
                }
            }
        }

        if (!node.isCollected && originalOwner === node.owner) {
            const eDiff = node.energy - originalEnergy;
            if (eDiff > 0) {
                animData.combats.push({ nodeId: node.id, force: eDiff, attacker: node.owner, clashAmount });
            } else if (eDiff < 0) {
                animData.combats.push({ nodeId: node.id, force: Math.abs(eDiff), attacker: -1, clashAmount }); 
            } else {
                animData.combats.push({ nodeId: node.id, force: 0, attacker: 0, clashAmount });
            }
        } else if (!node.isCollected && originalOwner !== node.owner) {
            if (node.owner === 0) {
                animData.combats.push({ nodeId: node.id, force: 0, attacker: 0, clashAmount });
            } else {
                animData.combats.push({ nodeId: node.id, force: node.energy, attacker: node.owner, clashAmount }); 
            }
        }
      });

      next.weather = state.forecast;
      next.forecast = generateWeather();
      if (next.turn % 3 === 0) spawnItem(next);

      const nextAlivePlayers = [];
      for(let p=1; p<=state.playerCount; p++) if (next.nodes.some(n => n.type === 'base' && n.id === p && n.owner === p)) nextAlivePlayers.push(p);

      let winner = null, isGameOver = false;
      if (!nextAlivePlayers.includes(1)) isGameOver = true; 
      else if (nextAlivePlayers.length === 1 && nextAlivePlayers[0] === 1) { winner = 1; isGameOver = true; } 
      else if (nextAlivePlayers.length === 0) isGameOver = true; 
      else if (nextAlivePlayers.length === 1) { winner = nextAlivePlayers[0]; isGameOver = true; }

      next.alivePlayers = nextAlivePlayers;
      next.winner = winner; next.isGameOver = isGameOver; next.turn += 1;
      return { nextState: next, animData };
    };

    // --- メインコンポーネント ---

      const rx = (mobileClass, pcClass) => isMobile ? mobileClass : pcClass;

              const numParticles = Math.min(m.amount, 40);

                const delay = i * (0.6 / numParticles), particleP = (moveP - delay) / 0.4; 
                if (particleP > 0 && particleP < 1) {
                  const px = s.x + (t.x - s.x) * particleP, py = s.y + (t.y - s.y) * particleP;
                  const dx = t.y - s.y, dy = -(t.x - s.x), len = Math.sqrt(dx*dx + dy*dy) || 1;
                  const waveAmt = Math.sin(particleP * Math.PI * 6 + i) * 6, nx = (dx/len) * waveAmt, ny = (dy/len) * waveAmt;
                  ctx.beginPath(); ctx.arc(px + nx, py + ny, m.hops === 2 ? 2.5 : 4, 0, Math.PI * 2);
                  ctx.fillStyle = m.hops === 2 ? '#c084fc' : COLORS.players[m.owner]; ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;
                }
              }
              const headP = Math.max(0, Math.min(1, moveP / 0.4));
              if (headP > 0 && headP < 1) drawStrokedText(m.amount, s.x + (t.x - s.x) * headP, s.y + (t.y - s.y) * headP - 20, '#fff', 14);
            });
          }
          if (p > 0.55 && p < 0.8) {
            const popP = (p - 0.55) / 0.25, easeOut = popP * (2 - popP); 
            anim.data.combats.forEach(c => {
              if (c.clashAmount > 0) {
                const node = state.nodes.find(n => n.id === c.nodeId); if(!node || !visibleNodes.has(node.id)) return;
                const numSparks = Math.min(c.clashAmount, 80); 
                ctx.save(); ctx.globalCompositeOperation = 'lighter'; 
                for (let i = 0; i < numSparks; i++) {
                  const angle = i * 137.5 * Math.PI / 180, dist = (20 + (i % 60)) * easeOut;
                  ctx.beginPath(); ctx.moveTo(node.x + Math.cos(angle) * Math.max(0, dist - 15), node.y + Math.sin(angle) * Math.max(0, dist - 15));
                  ctx.lineTo(node.x + Math.cos(angle) * dist, node.y + Math.sin(angle) * dist);
                  ctx.lineWidth = 4 * (1 - popP); ctx.strokeStyle = i % 2 === 0 ? `rgba(250, 204, 21, ${1 - popP})` : `rgba(255, 255, 255, ${1 - popP})`; ctx.stroke();
                }

              </div>
            ) : gameMode === 'SOLO' ? (
              <div className={`bg-slate-800/80 ${rx('p-6 w-[90%]', 'p-8 w-auto')} rounded-xl border border-slate-500 shadow-xl backdrop-blur flex flex-col items-center mt-4`}>
                <h3 className={`${rx('text-xl', 'text-2xl')} text-white font-bold ${rx('mb-4', 'mb-6')}`}>参加派閥数を選択</h3>
                <div className={`flex ${rx('flex-col gap-3', 'flex-row gap-4')} w-full mb-6`}>
                  {[2, 3, 4].map(num => (
                    <button key={num} onClick={() => startSoloGame(num)} className={`${rx('px-6 py-3', 'px-8 py-4')} bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg transition-colors text-xl w-full`}>{num} 派閥</button>
                  ))}
                </div>
                <button onClick={() => setGameMode(null)} className="text-slate-400 hover:text-white underline mt-2 text-sm">◀ モード選択へ戻る</button>
              </div>
            ) : gameMode === 'MULTI' ? (
              <div className="flex flex-col items-center mt-4 w-full px-4">
                <div className={`flex ${rx('flex-col gap-6', 'flex-row gap-8')} w-full max-w-2xl justify-center`}>
                  <div className="bg-slate-800/80 p-6 rounded-xl border border-slate-500 shadow-xl backdrop-blur flex flex-col items-center flex-1">
                    <h3 className={`${rx('text-lg', 'text-xl')} text-yellow-400 font-bold mb-4`}>⛺ 部屋を作る (ホスト)</h3>
                    <p className={`text-slate-400 ${rx('text-xs', 'text-sm')} text-center mb-6`}>参加人数を選んで<br/>ルームIDを発行します。</p>
                    <div className="flex flex-wrap justify-center gap-2 w-full">
                      {[2, 3, 4].map(num => (
                        <button key={num} onClick={() => startHosting(num)} className="flex-1 px-2 py-2 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded transition-colors text-sm">{num} 派閥</button>
                      ))}
                    </div>
                  </div>
                  <div className="bg-slate-800/80 p-6 rounded-xl border border-slate-500 shadow-xl backdrop-blur flex flex-col items-center flex-1">
                    <h3 className={`${rx('text-lg', 'text-xl')} text-sky-400 font-bold mb-4`}>🍶 部屋に参加 (ゲスト)</h3>
                    <p className={`text-slate-400 ${rx('text-xs', 'text-sm')} text-center mb-6`}>ホストから受け取った<br/>4桁のIDを入力します。</p>
                    <div className="flex gap-2 w-full">
                      <input type="text" placeholder="ID" value={joinInput} onChange={(e) => setJoinInput(e.target.value)} className="flex-1 px-2 py-2 rounded bg-slate-900 text-white border border-slate-600 uppercase font-mono text-center tracking-widest text-base w-20" maxLength={4} />
                      <button onClick={() => joinRoom(joinInput)} disabled={!joinInput} className="px-4 py-2 bg-sky-600 hover:bg-sky-500 disabled:opacity-50 text-white font-bold rounded transition-colors text-sm w-20">参加</button>
                    </div>
                    {errorMsg && <p className="text-red-400 text-xs mt-3 font-bold">{errorMsg}</p>}
                  </div>
                </div>
                <button onClick={() => setGameMode(null)} className="text-slate-400 hover:text-white underline mt-8 text-sm">◀ モード選択へ戻る</button>
              </div>
            ) : null}
          </div>
        );
      }

      if (phase === 'WAITING_ROOM') {
        return (
          <div className="w-full h-screen flex flex-col items-center justify-center font-sans text-white p-4 relative" style={{ backgroundImage: BACKGROUNDS.sunny, backgroundSize: 'cover', backgroundPosition: 'center', boxShadow: 'inset 0 0 0 2000px rgba(15, 23, 42, 0.85)' }}>
            
            <div className="absolute top-2 right-2 z-[100] flex gap-2">
              <button onClick={() => setConfirmQuit(true)} className="bg-red-800/80 hover:bg-red-700 px-3 py-2 rounded-lg border border-red-600 text-white font-bold backdrop-blur text-xs shadow-lg">
                終了 / 戻る
              </button>
            </div>

            <h2 className={`${rx('text-2xl', 'text-4xl')} font-black text-green-400 mb-4 drop-shadow-lg flex items-center gap-2`}>✅ 通信接続完了！</h2>
            <p className={`${rx('text-sm', 'text-xl')} mb-10 text-slate-300 text-center`}>P2Pネットワークによる直接通信が確立されました。</p>
            
            <div className={`bg-slate-800/80 ${rx('p-4', 'p-6')} rounded-xl border border-slate-500 shadow-xl backdrop-blur w-full max-w-md mb-10`}>
              <h3 className={`${rx('text-base', 'text-lg')} text-slate-300 mb-4 font-bold border-b border-slate-600 pb-2 flex justify-between items-center`}>
                <span>参加メンバー ({gameData?.playerUids?.length} / {gameData?.playerCount})</span>
                <span className="font-mono text-sky-400 bg-sky-900/30 px-2 py-1 rounded">ID: {roomId}</span>
              </h3>
              <ul className="space-y-3">
                {gameData?.playerUids?.map((uid, i) => (
                  <li key={uid} className={`bg-slate-900/50 ${rx('px-3 py-2', 'px-4 py-3')} rounded-lg flex justify-between items-center border border-slate-700`}>
                    <div className="flex items-center gap-3">
                      <div className={`${rx('w-3 h-3', 'w-4 h-4')} rounded-full`} style={{backgroundColor: COLORS.players[gameData.players[uid]]}}></div>
                      <span className={`font-bold ${rx('text-sm', 'text-lg')}`}>派閥 {gameData.players[uid]} {uid === myUid ? '(あなた)' : ''}</span>
                    </div>
                    {gameData.hostUid === uid && <span className={`text-yellow-400 ${rx('text-[10px]', 'text-xs')} font-black bg-yellow-900/50 px-2 py-1 rounded`}>HOST</span>}
                  </li>
                ))}
              </ul>
            </div>

            {gameMode === 'HOST' ? (
              <button onClick={startGame} className={`px-12 py-5 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-black ${rx('text-lg', 'text-2xl')} rounded-xl shadow-2xl transition-all hover:-translate-y-1 w-full max-w-md`}>
                ゲーム開始 (空き枠はAI)
              </button>
            ) : (
              <div className="flex items-center gap-3 text-slate-400 text-lg animate-pulse text-center">
                ⏳ ホストが開始するのを待っています...
              </div>
            )}
            
            {/* 確認モーダル */}
            {confirmQuit && (
              <div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4">
                <div className="bg-slate-800 p-6 rounded-xl border border-slate-500 shadow-2xl max-w-sm w-full text-center">
                  <h3 className="text-xl font-bold text-white mb-4">タイトルへ戻りますか？</h3>
                  <p className="text-slate-400 text-sm mb-6">対戦中の場合、通信は切断されます。</p>
                  <div className="flex gap-4">
                    <button onClick={() => setConfirmQuit(false)} className="flex-1 py-3 bg-slate-600 hover:bg-slate-500 rounded-lg font-bold">キャンセル</button>
                    <button onClick={quitGame} className="flex-1 py-3 bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold">終了する</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const currentDayIndex = gameState ? (gameState.turn - 1) % 7 : 0;

      return (
        <div className="w-full h-screen bg-slate-900 flex flex-col items-center justify-center font-sans select-none text-white overflow-hidden relative">
          
          <div className="absolute top-2 left-2 z-[100] flex gap-2">
            <button onClick={() => setLayoutMode(m => m === 'auto' ? 'mobile' : m === 'mobile' ? 'pc' : 'auto')} className="bg-slate-800/80 hover:bg-slate-700 p-2 md:px-3 rounded-lg border border-slate-600 text-slate-300 backdrop-blur text-xs flex items-center gap-1 shadow-lg">
              {layoutMode === 'auto' ? '🔄 Auto' : layoutMode === 'mobile' ? '📱 スマホ版' : '💻 PC版'}
            </button>
          </div>

          <div className="absolute top-2 right-2 z-[100] flex gap-2">
            {phase !== 'SETUP' && (
              <button onClick={() => setConfirmQuit(true)} className="bg-red-800/80 hover:bg-red-700 px-3 py-2 rounded-lg border border-red-600 text-white font-bold backdrop-blur text-xs shadow-lg">
                終了 / 戻る
              </button>
            )}
          </div>

          {/* 確認モーダル */}
          {confirmQuit && (
            <div className="fixed inset-0 bg-black/80 z-[200] flex items-center justify-center p-4">
              <div className="bg-slate-800 p-6 rounded-xl border border-slate-500 shadow-2xl max-w-sm w-full text-center">
                <h3 className="text-xl font-bold text-white mb-4">タイトルへ戻りますか？</h3>
                <p className="text-slate-400 text-sm mb-6">対戦中の場合、通信は切断されます。</p>
                <div className="flex gap-4">
                  <button onClick={() => setConfirmQuit(false)} className="flex-1 py-3 bg-slate-600 hover:bg-slate-500 rounded-lg font-bold text-white">キャンセル</button>
                  <button onClick={quitGame} className="flex-1 py-3 bg-red-600 hover:bg-red-500 text-white rounded-lg font-bold">終了する</button>
                </div>
              </div>
            </div>
          )}
          
          <div className={`absolute top-0 w-full max-w-[900px] ${rx('p-2 mt-10', 'p-4 mt-8')} flex justify-between items-start z-10 pointer-events-none`}>
            <div className={`flex flex-col ${rx('gap-1', 'gap-2')} pointer-events-auto`}>
              <div className={`flex ${rx('gap-1', 'gap-3')}`}>
                {Array.from({length: gameState.playerCount}).map((_, i) => {
                  const p = i + 1; const isAlive = gameState.alivePlayers?.includes(p) ?? false;
                  return (
                    <div key={p} className={`px-2 py-1 ${rx('','md:px-4 md:py-2')} rounded-lg flex items-center gap-1 border transition-all ${isAlive ? 'opacity-100' : 'opacity-30 grayscale'}`} style={{ borderColor: COLORS.players[p], backgroundColor: `${COLORS.players[p]}33` }}>
                      <span className={`${rx('text-xs', 'text-base')}`}>{p === myPlayerNum ? '🛡️' : '👥'}</span>
                      <span className={`font-bold ${rx('text-[10px] hidden','text-sm inline')}`}>{p === myPlayerNum ? '自派閥' : `派閥 ${p}`}</span>
                    </div>
                  );
                })}
              </div>
              {(phase === 'INPUT' || phase === 'WAITING_FOR_OTHERS') && gameState.alivePlayers?.includes(myPlayerNum) && gameState.chips[myPlayerNum]?.length > 0 && (
                <div className={`flex flex-wrap ${rx('gap-1 max-w-[200px]', 'gap-2')} mt-1`}>
                  {gameState.chips[myPlayerNum].map((chipId, idx) => {
                    const isUsed = playerCommands.some(c => c.type === 'use_chip' && c.chipIdx === idx);
                    const usedCount = playerCommands.filter(c => c.type === 'use_chip').length;
                    const isDisabled = isUsed || (!isUsed && usedCount >= 2) || phase !== 'INPUT';
                    const isSelected = selectedChip?.idx === idx;
                    const info = CHIP_TYPES[chipId];
                    const imgSrc = loadedImages[info.imgKey]?.src;

                    return (
                      <div key={idx} className="relative group">
                        <button onClick={() => !isDisabled && handleChipSelect(chipId, idx)} disabled={isDisabled && !isSelected} className={`flex items-center gap-1 ${rx('px-1 py-0.5', 'px-2 py-1')} rounded ${rx('text-[10px]', 'text-xs')} border transition-all ${isUsed ? 'bg-slate-700 text-slate-500 border-slate-600' : isSelected ? 'bg-indigo-600 text-white border-indigo-400 animate-pulse' : isDisabled ? 'bg-slate-800 text-slate-600 border-slate-700 opacity-50' : 'bg-slate-800 text-indigo-300 border-indigo-500 hover:bg-indigo-900'}`}>
                          {imgSrc ? <img src={imgSrc} alt={info.name} className={`${rx('w-3 h-3', 'w-4 h-4')} object-contain`} /> : <span>{info.icon}</span>}
                          <span className={`${rx('hidden', 'inline')}`}>{info.name}</span>
                        </button>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
            
            <div className={`flex flex-col items-end ${rx('gap-1', 'gap-2')}`}>
              {gameMode === 'MULTI' && <div className={`text-green-400 font-mono ${rx('text-[10px]', 'text-sm')} bg-slate-800/80 px-2 py-0.5 rounded border border-green-600/50 flex items-center gap-1`}><span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span><span className={`${rx('hidden', 'inline')}`}>ROOM: </span>{roomId}</div>}
              <div className={`flex ${rx('flex-col items-end gap-1', 'flex-row items-center gap-4')} bg-slate-800/90 border border-slate-600 ${rx('px-3 py-1 rounded-lg', 'px-5 py-2 rounded-full')} shadow-lg`}>
                <div className={`flex items-center gap-1 text-slate-300 ${rx('text-xs', 'text-base')}`}>
                  <span className="text-sky-400">📅</span> <span className="font-bold">{gameState.turn}日目 <span className={`${rx('hidden', 'inline')}`}>({DAYS[currentDayIndex]})</span></span>
                </div>
                <div className={`flex items-center gap-1 text-slate-300 ${rx('border-none pl-0 text-xs', 'border-l border-slate-600 pl-4 text-base')}`}>
                  {renderWeatherIcon(gameState.weather, rx('w-4 h-4', 'w-6 h-6'), loadedImages)} <span className={`font-bold ${rx('hidden', 'inline')}`}>{getWeatherName(gameState.weather)}</span>
                </div>
                <div className={`flex items-center gap-1 text-lime-400 ${rx('border-none pl-0 text-[10px]', 'border-l border-slate-600 pl-4 text-sm')} font-bold`}>
                  🗑️ <span className={`${rx('hidden', 'inline')}`}>回収日: </span>{DAYS[gameState.trashDays[0]]}・{DAYS[gameState.trashDays[1]]}
                </div>
              </div>
            </div>
          </div>

          <div className={`relative border-y border-slate-700 shadow-2xl flex-shrink-0 touch-none ${rx('mt-16 w-full', 'mt-16 w-full max-w-[900px] rounded-xl')}`} style={{ aspectRatio: '3/2', backgroundImage: gameState ? BACKGROUNDS[gameState.weather] : BACKGROUNDS.sunny, backgroundSize: 'cover', backgroundPosition: 'center' }}>
            
            <div className={`absolute inset-0 ${rx('', 'rounded-xl')} overflow-hidden`}>
              <canvas ref={canvasRef} width={MAP_W} height={MAP_H} onClick={handleCanvasClick} onMouseMove={handleCanvasMouseMove} className={`absolute top-0 left-0 w-full h-full ${phase==='INPUT' ? 'cursor-crosshair' : ''}`} />
              
              {gameMode === 'TUTORIAL' && phase === 'INPUT' && (
                <div className={`absolute ${rx('top-10 w-[90%]', 'top-24 w-full max-w-3xl')} left-1/2 transform -translate-x-1/2 z-20 pointer-events-none`}>
                  <div className="bg-slate-800/95 border border-sky-500 text-sky-100 p-3 rounded-xl shadow-[0_0_20px_rgba(14,165,233,0.4)] pointer-events-auto text-center">
                    <h3 className={`${rx('text-sm', 'text-lg')} font-bold text-yellow-400 mb-1`}>{PLAYABLE_TUTORIALS.find(s=>s.id === tutorialStage)?.title}</h3>
                    <p className={`${rx('text-xs', 'text-sm')} whitespace-pre-wrap leading-relaxed`}>{PLAYABLE_TUTORIALS.find(s=>s.id === tutorialStage)?.message}</p>
                  </div>
                </div>
              )}

              {phase === 'ANIMATING' && (
                 <div className={`absolute ${rx('top-4 text-xs px-4 py-1', 'top-8 text-xl px-8 py-2')} left-1/2 transform -translate-x-1/2 text-white font-black tracking-widest bg-slate-900/80 border border-yellow-500/50 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.3)] z-10 whitespace-nowrap`}>
                   {animRef.current.progress < 0.25 ? 'PHASE 1: 準備 (カット・設備強化)' : 
                    animRef.current.progress < 0.6 ? 'PHASE 2: 輸送 & 襲撃' : 
                    animRef.current.progress < 0.85 ? 'PHASE 3: 解決 (乱戦・ショバ強奪)' : 'PHASE 4: 資源回収・天候効果'}
                 </div>
              )}

              {phase === 'WAITING_FOR_OTHERS' && (
                <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center z-40 pointer-events-auto">
                  <span className={`${rx('text-4xl mb-4', 'text-6xl mb-6')} animate-spin text-sky-400 inline-block`}>⏳</span>
                  <h2 className={`${rx('text-lg mb-6', 'text-3xl mb-8')} font-black text-white tracking-widest drop-shadow-lg`}>他の派閥の行動を待機中...</h2>
                  <div className="flex flex-wrap justify-center gap-2 px-4">
                     {Object.values(gameData?.players || {}).filter(p => gameState.alivePlayers?.includes(p)).map(p => {
                       const isReady = gameData?.turnReady?.[p];
                       return (
                         <div key={p} className={`px-4 py-2 rounded-lg border flex flex-col items-center gap-1 shadow-lg transition-colors ${isReady ? 'bg-sky-600/80 border-sky-400 text-white' : 'bg-slate-800/80 border-slate-600 text-slate-400'}`}>
                           <span className={`font-bold ${rx('text-sm', 'text-lg')}`}>派閥 {p}</span><span className="text-[10px]">{isReady ? '準備完了' : '考慮中...'}</span>
                         </div>
                       );
                     })}
                  </div>
                </div>
              )}

              {phase === 'TUTORIAL_CLEAR' && (
                <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center z-50 p-4 text-center">
                  <h1 className={`${rx('text-4xl', 'text-7xl')} font-black mb-4 text-green-400 drop-shadow-lg`}>STAGE CLEAR!</h1>
                  {tutorialStage < PLAYABLE_TUTORIALS.length ? (
                    <button onClick={() => startPlayableTutorial(tutorialStage + 1)} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-white hover:bg-slate-200 text-slate-900 font-bold rounded-xl mt-4 transition-all shadow-xl`}>
                      次のステージへ ▶
                    </button>
                  ) : (
                    <div className="flex flex-col items-center">
                      <p className={`text-yellow-400 ${rx('text-lg mb-4', 'text-2xl mb-6')} font-bold`}>全てのチュートリアルをクリアしました！</p>
                      <button onClick={quitGame} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-white hover:bg-slate-200 text-slate-900 font-bold rounded-xl transition-all shadow-xl`}>
                        タイトルへ戻る
                      </button>
                    </div>
                  )}
                </div>
              )}

              {phase === 'GAME_OVER' && (
                <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm flex flex-col items-center justify-center z-50 p-4 text-center">
                  <h1 className={`${rx('text-5xl', 'text-7xl')} font-black mb-4 drop-shadow-lg`} style={{ color: gameState.winner ? COLORS.players[gameState.winner] : '#cbd5e1' }}>
                    {gameState.winner === myPlayerNum ? 'VICTORY' : gameState.winner ? `派閥 ${gameState.winner} の勝利` : 'DRAW'}
                  </h1>
                  {gameState.winner !== myPlayerNum && gameState.winner !== null && <p className={`text-red-400 ${rx('text-xl', 'text-2xl')} font-bold mb-4 tracking-widest`}>地下帝国 陥落</p>}
                  
                  {gameMode === 'TUTORIAL' ? (
                     <button onClick={() => startPlayableTutorial(tutorialStage)} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-white hover:bg-slate-200 text-slate-900 font-bold rounded-xl mt-4 transition-all shadow-xl`}>リトライ</button>
                  ) : (
                     <button onClick={quitGame} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-white hover:bg-slate-200 text-slate-900 font-bold rounded-xl mt-4 transition-all shadow-xl`}>タイトルへ戻る</button>
                  )}
                </div>
              )}
            </div>

            {renderTargetPrompt()}
            {renderSlider()}
          </div>

          {renderMenu()}

          <div className={`w-full max-w-[900px] flex ${rx('flex-col gap-2 px-2 mt-2 pb-24', 'flex-row gap-6 px-4 mt-4 pb-2')} flex-1 min-h-0 relative z-0`}>
            <div className={`flex-1 bg-slate-800 border border-slate-700 rounded-xl ${rx('p-2', 'p-4')} overflow-y-auto relative flex flex-col`}>
              <h3 className={`text-slate-400 ${rx('text-xs', 'text-sm')} font-bold mb-2 flex items-center justify-between flex-shrink-0`}>
                <div className="flex items-center gap-1">🪙 行動予定 <span className={`${rx('hidden', 'inline')}`}>(1ショバにつき1行動)</span></div>
                <button onClick={handleAiAdvice} disabled={gameMode === 'TUTORIAL' || (phase !== 'INPUT' && phase !== 'WAITING_FOR_OTHERS') || isAiLoading || !gameState?.alivePlayers?.includes(myPlayerNum)} className={`flex items-center gap-1 bg-yellow-600/30 hover:bg-yellow-600/50 text-yellow-300 ${rx('px-2 py-1 text-[10px]', 'px-3 py-1 text-xs')} rounded transition-colors border border-yellow-500/50 disabled:opacity-50 disabled:cursor-not-allowed`}>
                  ✨ <span className={`${rx('hidden', 'inline')}`}>参謀AIに</span>相談
                </button>
              </h3>
              {!gameState?.alivePlayers?.includes(myPlayerNum) && (phase === 'INPUT' || phase === 'WAITING_FOR_OTHERS') ? (
                 <div className={`text-red-400 ${rx('text-xs', 'text-sm')}`}>あなたの派閥は全滅しました。観戦モードです。</div>
              ) : (
                <div className={`flex flex-wrap ${rx('gap-1', 'gap-2')} overflow-y-auto content-start`}>
                  {playerCommands.map((cmd, idx) => (
                    <div key={idx} className={`border rounded ${rx('px-2 py-1 text-[10px]', 'px-3 py-1.5 text-sm')} flex items-center gap-1 shadow ${cmd.type === 'use_chip' ? 'bg-indigo-900/50 border-indigo-500 text-indigo-200' : 'bg-slate-700 border-slate-600 text-white'}`}>
                      {cmd.type === 'move' && (() => {
                         const isStealth = playerCommands.some(c => c.type === 'use_chip' && c.chip === 'STEALTH' && c.targetId === cmd.nodeId);
                         return <><span className="text-sky-400">➡️</span> {cmd.nodeId} → {cmd.targetId} ({cmd.amount}) {isStealth && '(隠密)'}</>;
                      })()}
                      {cmd.type === 'toggle_mode' && <><span className="text-purple-400">📡</span> {cmd.nodeId} 遠隔切替</>}
                      {cmd.type === 'upgrade' && <><span className="text-emerald-400">⛺</span> {cmd.nodeId} 設備強化</>}
                      {cmd.type === 'cut' && <><span className="text-red-400">✂️</span> {cmd.nodeId}-{cmd.targetId} 切断</>}
                      {cmd.type === 'use_chip' && (() => {
                        const info = CHIP_TYPES[cmd.chip];
                        const imgSrc = loadedImages[info.imgKey]?.src;
                        return (
                          <>
                            {imgSrc ? <img src={imgSrc} className={`${rx('w-3 h-3', 'w-4 h-4')} object-contain`}/> : <span className="text-indigo-400">{info.icon}</span>}
                            <span className={`${rx('hidden', 'inline')}`}>{info.name}</span> {cmd.targetId && `-> ${cmd.targetId}`}
                          </>
                        );
                      })()}
                      {phase === 'INPUT' && <button onClick={() => removeCommand(cmd)} className="text-slate-400 hover:text-white ml-1">❌</button>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button onClick={handleLockIn} disabled={phase !== 'INPUT'} className={`${rx('w-full py-3 h-12 text-lg', 'w-64 h-auto text-xl')} bg-gradient-to-r from-yellow-600 to-orange-600 hover:from-yellow-500 disabled:from-slate-700 disabled:to-slate-700 disabled:text-slate-500 text-white font-black rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg flex-shrink-0`}>
              <span className={`${rx('text-xl', 'text-2xl')}`}>▶️</span> {gameState?.alivePlayers?.includes(myPlayerNum) ? '行動確定' : '待機中'}
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NodeWars />);
  </script>
</body>
</html>
