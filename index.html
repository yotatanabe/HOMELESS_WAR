<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>菌バトル</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body.resizing { user-select: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    }
    .immune-target { animation: pulse-red 1.5s infinite; }
  </style>
</head>
<body class="bg-black overflow-hidden text-white touch-manipulation">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const MAP_W = 900;
    const MAP_H = 600;

    const COLORS = {
      bg: '#000000', edge: '#fca5a5', neutral: '#64748b', dump: '#991b1b',     
      players: ['#64748b', '#3b82f6', '#ef4444', '#22c55e', '#eab308'],
      highlight: '#facc15', long_range: '#a855f7'
    };

    const BACKGROUNDS = {
      normal: 'url("https://images.unsplash.com/photo-1614850715649-1d0106293cb1?auto=format&fit=crop&q=80&w=900&h=600")',
      fever: 'url("https://images.unsplash.com/photo-1576502200916-3808e07386a5?auto=format&fit=crop&q=80&w=900&h=600")',
      tachycardia: 'url("https://images.unsplash.com/photo-1557672172-298e090bd0f1?auto=format&fit=crop&q=80&w=900&h=600")'
    };

    const DAYS = ['日', '月', '火', '水', '木', '金', '土'];
    const ASSETS = {};

    const CHIP_TYPES = {
      EMP: { id: 'EMP', name: '溶解酵素', desc: '敵の防壁(カット)を溶かす', icon: '🧬' },
      STEALTH: { id: 'STEALTH', name: '免疫擬態', desc: '悟られずに浸潤する', icon: '🥷' },
      BOOST: { id: 'BOOST', name: '鞭毛モーター', desc: '1T 血流移動ロス0', icon: '〰️' },
      MINE_BOOST: { id: 'MINE_BOOST', name: '異常代謝', desc: '1T 選択組織の増殖量x2', icon: '♨️' },
      ATK_BOOST: { id: 'ATK_BOOST', name: '猛毒素', desc: '1T 選択組織の攻撃力x2', icon: '☠️' },
      SABOTAGE: { id: 'SABOTAGE', name: 'バクテリオシン', desc: '1T 敵組織の増殖停止', icon: '💊' }
    };

    const TISSUE_INFO = {
      mucosa: { name: '粘膜細胞', radius: 35, icon: '🦠' },
      epithelium: { name: '上皮組織', radius: 20, icon: '🧬' },
      muscle: { name: '筋肉組織', radius: 28, icon: '🥩' },
      organ: { name: '主要臓器', radius: 32, icon: '🫀' },
      necrosis: { name: '壊死部位', radius: 32, icon: '💀' },
    };

    const TUTORIAL_SLIDES = [
      { title: "🦠 菌バトル", icon: "🫀", content: "あなたは人体に侵入した「新種の病原菌」だ。他の競合するバクテリア（ライバル派閥）と限られた栄養を奪い合い、宿主の身体を完全に支配すれば勝利となる。\n組織（丸い拠点）にある数字は「菌数」だ。この菌を隣接する組織に浸潤（移動）させて、領土を広げるんだ。" },
      { title: "🩸 浸潤と乱戦", icon: "➡️", content: "自分の組織をクリックして【浸潤（輸送）】を選び、送り込む菌数を決めろ。全員が行動を「確定」すると、一斉に感染拡大が始まる。\n複数の菌が同じ組織に侵入した場合、入り乱れての「大乱戦」になる。お互いの菌が削り合い、最後に残った菌がそこを占領するぞ！" },
      { title: "🛡️ バイオフィルム形成", icon: "🛠️", content: "【バイオフィルム形成（設備強化）】: 膜レベルに応じて菌を消費し、組織のレベルを上げる。レベル1から2へは10、2から3へは20、3から4へは30のコストがかかるぞ！最大増殖量が増え、敵から受ける攻撃力を「Lv2なら20%」「Lv3なら40%」「Lv4なら60%」カットして防いでくれる強固な陣地になるぜ！\n【細胞壁硬化（カット）】: 10菌を消費して血管を1ターン塞ぐ、防衛の要だ。" },
      { title: "📡 芽胞化と血流乗布", icon: "〰️", content: "「血流（遠隔）モード」に切り替えると、その組織での増殖が止まる代わりに、血流に乗って2マス先まで一気に感染を広げられる。\nただし、遠くへの移動は道中の免疫に狩られる「ロス（減衰）」が発生する。組織レベルを上げればロスは減るぜ。" },
      { title: "💀 壊死崩壊と 🧬 突然変異", icon: "💀", content: "【壊死部位（ゴミ捨て場）】は普段は栄養がないが、定期的に細胞が崩壊して「大量の栄養素（菌数）」が手に入る！\nまた、マップに現れる【プラスミド（段ボール）】を攻撃して壊すと、猛毒素や溶解酵素などの強力な「変異遺伝子（アイテム）」を獲得できるぞ。" },
      { title: "🚨 マクロファージの襲来", icon: "🚨", content: "【マクロファージ（白血球）】の貪食に気をつけろ！\n3ターンに1回、ランダムな組織に免疫細胞が襲来し、そこにいる菌数を「強制的に半分」にしてしまう。\n赤いターゲットマークが出た組織からは、事前に逃げるか、半分にされるのを覚悟で耐え忍ぶかの決断が必要だ！" },
      { title: "🤝 2vs2 混合感染（チーム戦）", icon: "🤝", content: "【チーム戦ルール】\nチーム1 (青・赤) vs チーム2 (緑・黄) の複合感染バトルだ。\n同盟菌の組織に菌を送ると、攻撃ではなく「支援（合流して回復）」になる。\n「相手チームの初期臓器（本拠地）をどちらか片方でも制圧した瞬間」に宿主の機能不全を引き起こして勝利だ！" }
    ];

    const PLAYABLE_TUTORIALS = [
      {
        id: 1, title: "STAGE 1: 最初の感染", message: "まずは隣の「上皮組織」に感染してみよう。\n自分の拠点（粘膜細胞）をクリックして【浸潤（輸送）】を選び、隣の拠点をクリックだ。\n送る菌数を決めたら右下の【行動確定】を押せ！", allowedActions: ['move'],
        setup: () => ({ nodes: [{ id: 1, x: 250, y: 300, owner: 1, energy: 50, maxEnergy: 100, generation: 10, type: 'base', shobaType: 'mucosa', level: 1, mode: 'normal' }, { id: 2, x: 650, y: 300, owner: 0, energy: 10, maxEnergy: 50, generation: 5, type: 'normal', shobaType: 'epithelium', level: 1, mode: 'normal' }], edges: [{ s: 1, t: 2, isOneWay: false }], playerCount: 1, isTeamBattle: false }),
        cpuLogic: () => [], checkWin: (state) => state.nodes.find(n => n.id === 2)?.owner === 1
      }
    ];

    const getTeam = (p, isTeamBattle) => {
      if (!isTeamBattle) return p;
      if (p === 1 || p === 2) return 1;
      if (p === 3 || p === 4) return 2;
      return 0; 
    };

    const isAlly = (p1, p2, isTeamBattle) => {
      if (p1 === 0 || p2 === 0) return false;
      return getTeam(p1, isTeamBattle) === getTeam(p2, isTeamBattle);
    };

    const isEnemy = (p1, p2, isTeamBattle) => {
      if (p1 === 0 || p2 === 0) return true; 
      return getTeam(p1, isTeamBattle) !== getTeam(p2, isTeamBattle);
    };

    const generateWeather = () => { const r = Math.random(); if (r < 0.2) return 'tachycardia'; if (r < 0.4) return 'fever'; return 'normal'; };
    const getWeatherName = (weather) => { if (weather === 'tachycardia') return '頻脈 (血流ロス増大)'; if (weather === 'fever') return '発熱 (Lv1組織ダメージ)'; return '平熱 (安定)'; };
    const renderWeatherIcon = (weather, sizeClass='w-6 h-6') => {
      if (weather === 'tachycardia') return <span className={`${sizeClass} flex items-center justify-center text-yellow-400 drop-shadow-md text-xl`}>💓</span>; 
      if (weather === 'fever') return <span className={`${sizeClass} flex items-center justify-center text-red-500 drop-shadow-md text-xl`}>🔥</span>; 
      return <span className={`${sizeClass} flex items-center justify-center text-green-400 drop-shadow-md text-xl`}>🧬</span>;
    };

    const intersects = (a, b, c, d) => {
      const ccw = (p1, p2, p3) => (p3.y - p1.y) * (p2.x - p1.x) > (p2.y - p1.y) * (p3.x - p1.x);
      if (a.x === c.x && a.y === c.y) return false; if (a.x === d.x && a.y === d.y) return false; if (b.x === c.x && b.y === c.y) return false; if (b.x === d.x && b.y === d.y) return false;
      return ccw(a, c, d) !== ccw(b, c, d) && ccw(a, b, c) !== ccw(a, b, d);
    };

    const getDistance = (n1, n2) => Math.sqrt(Math.pow(n1.x - n2.x, 2) + Math.pow(n1.y - n2.y, 2));

    const canMove = (id1, id2, edges, cutEdges = [], ignoreOneWay = false) => {
      return edges.some(e => {
        const isCut = cutEdges.some(ce => (ce.s === e.s && ce.t === e.t) || (ce.s === e.t && ce.t === e.s));
        if (isCut) return false;
        if (e.isOneWay && !ignoreOneWay) return e.s === id1 && e.t === id2;
        return (e.s === id1 && e.t === id2) || (e.s === id2 && e.t === id1);
      });
    };

    const getHopDistance = (id1, id2, edges, cutEdges = [], ignoreOneWay = false) => {
      if (id1 === id2) return 0;
      if (canMove(id1, id2, edges, cutEdges, ignoreOneWay)) return 1;
      const neighbors = [];
      edges.forEach(e => {
        const isCut = cutEdges.some(ce => (ce.s === e.s && ce.t === e.t) || (ce.s === e.t && ce.t === e.s));
        if (isCut) return;
        if (e.s === id1) neighbors.push(e.t);
        else if (e.t === id1 && (!e.isOneWay || ignoreOneWay)) neighbors.push(e.s);
      });
      for (const n of neighbors) { if (canMove(n, id2, edges, cutEdges, ignoreOneWay)) return 2; }
      return Infinity;
    };

    const getTargetableNodes = (startId, nodes, edges, maxHops, ignoreOneWay = false) => {
      return nodes.filter(n => n.id !== startId && getHopDistance(startId, n.id, edges, [], ignoreOneWay) <= maxHops);
    };

    const getVisibleNodes = (playerId, nodes, edges, isTeamBattle) => {
      const visible = new Set();
      nodes.forEach(n => {
        if (n.type === 'base') {
          visible.add(n.id);
        }
        if (n.owner === playerId || (isTeamBattle && isAlly(n.owner, playerId, isTeamBattle))) {
          visible.add(n.id);
          const neighbors1 = new Set();
          edges.forEach(e => { if (e.s === n.id) neighbors1.add(e.t); if (e.t === n.id) neighbors1.add(e.s); });
          neighbors1.forEach(neighborId => visible.add(neighborId));
          if (n.mode === 'long_range') {
            neighbors1.forEach(neighborId => { edges.forEach(e => { if (e.s === neighborId) visible.add(e.t); if (e.t === neighborId) visible.add(e.s); }); });
          }
        }
      });
      return visible;
    };

    const getLossRate = (level, weather) => {
      let rate = 0;
      if (level === 1) rate = 0.5; else if (level === 2) rate = 0.3; else if (level === 3) rate = 0.1; else if (level >= 4) rate = 0;
      if (weather === 'tachycardia') rate = Math.min(0.9, rate + 0.4); 
      return rate;
    };

    const getLevelName = (level) => { if (level === 1) return '菌コロニー'; if (level === 2) return '薄層バイオフィルム'; if (level === 3) return '強固バイオフィルム'; if (level === 4) return '鉄壁バイオフィルム'; return ''; };

    const spawnItem = (mapData) => {
      const { nodes, edges } = mapData;
      let x, y, valid = false, attempts = 0;
      while (!valid && attempts < 100) { x = 100 + Math.random() * 700; y = 100 + Math.random() * 400; valid = nodes.every(n => Math.sqrt(Math.pow(x - n.x, 2) + Math.pow(y - n.y, 2)) > 70); attempts++; }
      if (!valid) return;
      const newId = Math.max(...nodes.map(n => n.id)) + 1;
      const itemType = Object.keys(CHIP_TYPES)[Math.floor(Math.random() * Object.keys(CHIP_TYPES).length)];
      const newItem = { id: newId, x, y, owner: 0, energy: 5, maxEnergy: 5, generation: 0, type: 'item', level: 1, mode: 'normal', item: itemType };
      nodes.push(newItem);
      const potentialEdges = nodes.filter(n => n.id !== newId).map(n => ({ t: n.id, dist: Math.sqrt(Math.pow(newItem.x - n.x, 2) + Math.pow(newItem.y - n.y, 2)), n })).filter(e => e.dist < 250).sort((a, b) => a.dist - b.dist);
      let connections = 0;
      for (const edge of potentialEdges) {
        if (connections >= 2) break; 
        let hasIntersection = false;
        for (const e of edges) {
          const e_n1 = nodes.find(n => n.id === e.s); const e_n2 = nodes.find(n => n.id === e.t);
          if (e_n1 && e_n2 && intersects(newItem, edge.n, e_n1, e_n2)) { hasIntersection = true; break; }
        }
        if (!hasIntersection) { edges.push({ s: edge.t, t: newItem.id, isOneWay: Math.random() < 0.4 }); connections++; }
      }
    };

    const generateMap = (playerCount, isTeamBattle) => {
      const nodes = [], bases = [];
      const actualPlayers = isTeamBattle ? 4 : playerCount;
      
      if (actualPlayers === 2) bases.push({ x: 150, y: 300 }, { x: 750, y: 300 });
      else if (actualPlayers === 3) bases.push({ x: 450, y: 100 }, { x: 200, y: 450 }, { x: 700, y: 450 });
      else bases.push({ x: 150, y: 150 }, { x: 150, y: 450 }, { x: 750, y: 150 }, { x: 750, y: 450 }); 

      for (let i = 1; i <= actualPlayers; i++) nodes.push({ id: i, x: bases[i-1].x, y: bases[i-1].y, owner: i, energy: 100, maxEnergy: 200, generation: 10, type: 'base', shobaType: 'mucosa', level: 1, mode: 'normal' });

      let idCounter = 5; 
      for (let i = 0; i < 12 + (actualPlayers * 2); i++) {
        let x, y, valid = false, attempts = 0;
        while (!valid && attempts < 200) { x = 100 + Math.random() * 700; y = 100 + Math.random() * 400; valid = nodes.every(n => Math.sqrt(Math.pow(x - n.x, 2) + Math.pow(y - n.y, 2)) > 75); attempts++; }
        const isDump = i < 2; let shobaType = 'epithelium', energy = 0, maxEnergy = 0, generation = 0;
        if (isDump) { shobaType = 'necrosis'; energy = 10; maxEnergy = 500; generation = 0; } 
        else {
          const rand = Math.random();
          if (rand < 0.6) { shobaType = 'epithelium'; energy = Math.floor(Math.random() * 11) + 10; maxEnergy = 30; generation = 3; } 
          else if (rand < 0.9) { shobaType = 'muscle'; energy = Math.floor(Math.random() * 16) + 20; maxEnergy = 60; generation = 6; } 
          else { shobaType = 'organ'; energy = Math.floor(Math.random() * 21) + 30; maxEnergy = 100; generation = 10; }
        }
        nodes.push({ id: idCounter++, x, y, owner: 0, energy, maxEnergy, generation, type: isDump ? 'dump' : 'normal', shobaType, level: 1, mode: 'normal' });
      }

      const edges = [], potentialEdges = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) potentialEdges.push({ s: nodes[i].id, t: nodes[j].id, dist: Math.sqrt(Math.pow(nodes[i].x - nodes[j].x, 2) + Math.pow(nodes[i].y - nodes[j].y, 2)), n1: nodes[i], n2: nodes[j] });
      }
      potentialEdges.sort((a, b) => a.dist - b.dist);
      for (const edge of potentialEdges) {
        if (edge.dist > 350) continue; if (edge.dist > 150 && Math.random() < 0.4) continue;
        const n1Edges = edges.filter(e => e.s === edge.n1.id || e.t === edge.n1.id).length; const n2Edges = edges.filter(e => e.s === edge.n2.id || e.t === edge.n2.id).length;
        if (n1Edges >= 4 || n2Edges >= 4) continue;
        let hasIntersection = false;
        for (const e of edges) {
          const e_n1 = nodes.find(n => n.id === e.s); const e_n2 = nodes.find(n => n.id === e.t);
          if (e_n1 && e_n2 && intersects(edge.n1, edge.n2, e_n1, e_n2)) { hasIntersection = true; break; }
        }
        if (!hasIntersection) edges.push({ s: edge.s, t: edge.t, isOneWay: Math.random() < 0.25 });
      }

      const visited = new Set();
      const dfs = (id) => { if (visited.has(id)) return; visited.add(id); edges.forEach(e => { if (e.s === id) dfs(e.t); if (e.t === id) dfs(e.s); }); };
      dfs(1); if (visited.size < nodes.length) return generateMap(actualPlayers, isTeamBattle); 
      const mapData = { nodes, edges }; spawnItem(mapData); return mapData;
    };

    const generateCpuCommands = (state, cpuPlayers) => {
      let cmds = [];
      for (const p of cpuPlayers) {
        if (!state.alivePlayers.includes(p)) continue;
        let usedChipsCount = 0; const pChips = [...state.chips[p]];
        const tryUseChip = (chipType, targetId, playerId) => {
          if (usedChipsCount >= 2) return false; const idx = pChips.indexOf(chipType);
          if (idx !== -1 && !cmds.some(c => c.type === 'use_chip' && c.chip === chipType && c.targetId === targetId)) {
            cmds.push({ type: 'use_chip', chip: chipType, targetId, playerId, chipIdx: idx }); pChips[idx] = null; usedChipsCount++; return true;
          }
          return false;
        };
        const myNodes = state.nodes.filter(n => n.owner === p);
        if (pChips.includes('MINE_BOOST')) {
          const bestMineNode = myNodes.filter(n => n.mode === 'normal').sort((a, b) => b.generation - a.generation)[0];
          if (bestMineNode) tryUseChip('MINE_BOOST', bestMineNode.id, p);
        }
        if (pChips.includes('SABOTAGE')) {
          const bestSabotageNode = state.nodes.filter(n => isEnemy(n.owner, p, state.isTeamBattle) && n.type !== 'item' && n.mode === 'normal').sort((a, b) => b.generation - a.generation)[0];
          if (bestSabotageNode) tryUseChip('SABOTAGE', bestSabotageNode.id, p);
        }
        myNodes.forEach(node => {
          if (node.energy < 10) return; 
          const ignoreOneWay = node.mode === 'long_range';
          const adjNodes = getTargetableNodes(node.id, state.nodes, state.edges, 1, ignoreOneWay);
          const dist2Nodes = getTargetableNodes(node.id, state.nodes, state.edges, 2, ignoreOneWay);
          const threats = adjNodes.filter(n => isEnemy(n.owner, p, state.isTeamBattle) && n.type !== 'item' && n.energy > node.energy + 20);
          
          if (threats.length > 0 && node.energy >= 10 && Math.random() < 0.7) {
            threats.sort((a, b) => b.energy - a.energy); cmds.push({ type: 'cut', nodeId: node.id, targetId: threats[0].id, playerId: p });
            if (pChips.includes('EMP')) tryUseChip('EMP', threats[0].id, p); return; 
          }
          const upCost = node.level * 10;
          if (node.level < 4 && node.energy >= upCost * 2 && threats.length === 0) { cmds.push({ type: 'upgrade', nodeId: node.id, playerId: p }); return; }
          
          const hasAdjTarget = adjNodes.some(n => n.owner !== p); 
          const hasDist2Target = dist2Nodes.some(n => n.owner !== p && !adjNodes.find(an => an.id === n.id));
          if (node.mode === 'normal') { if (!hasAdjTarget && hasDist2Target && Math.random() < 0.8) { cmds.push({ type: 'toggle_mode', nodeId: node.id, playerId: p }); return; } } 
          else if (node.mode === 'long_range') { if (hasAdjTarget || !hasDist2Target) { cmds.push({ type: 'toggle_mode', nodeId: node.id, playerId: p }); return; } }
          
          if (node.energy < 20) return; 
          const hops = node.mode === 'long_range' ? 2 : 1; const targets = hops === 1 ? adjNodes : dist2Nodes; 
          const validTargets = targets.filter(n => n.owner !== p);

          if (validTargets.length > 0) {
            const scoredTargets = validTargets.map(t => {
              let score = 0;
              if (t.type === 'item') score += 1000; 
              else if (t.owner === 0) score += 500 - t.energy; 
              else if (isEnemy(t.owner, p, state.isTeamBattle)) {
                  if (t.type === 'base') score += 800 - t.energy;
                  else score += 300 - t.energy;
              } else if (isAlly(t.owner, p, state.isTeamBattle)) {
                  score += 250 - t.energy; 
                  if (t.type === 'base' && t.energy < 50) score += 900; 
              }
              const requiredEnergy = hops === 2 ? t.energy / (1 - getLossRate(node.level, state.weather)) : t.energy;
              if (node.energy > requiredEnergy) score += 200; 
              return { target: t, score };
            });
            scoredTargets.sort((a, b) => b.score - a.score); const bestTarget = scoredTargets[0].target;
            let amount = Math.floor(node.energy * 0.5); let required = bestTarget.energy + 5;
            if (hops === 2) required = Math.ceil(required / (1 - getLossRate(node.level, state.weather)));
            if (node.energy > required && required > amount) amount = required;

    const simulateTurn = (state, allCommands) => {

                     animData.combats.push({ nodeId: node.id, force: Math.abs(eDiff), attacker: -1, clashAmount });

        } else {

      const drawCanvas = (ctx, state, commands, cpuCmds, ui, hoveredId, anim, time, currentPhase) => {

              ctx.fillStyle = grad; ctx.arc(node.x, node.y, 160, 0, Math.PI * 2); ctx.fill();

          ctx.stroke(); ctx.setLineDash([]);
          if (edge.isOneWay) {

            const size = 12 / cameraRef.current.scale;

            ctx.fillStyle = isCutPlanned && (currentPhase === 'INPUT' || currentPhase === 'WAITING_FOR_OTHERS') ? '#ef4444' : 'rgba(255, 100, 100, 0.6)'; ctx.fill(); ctx.restore();

              if (s && t) {

                ctx.strokeStyle = hops === 2 ? 'rgba(192, 132, 252, 0.8)' : (isAlly(cmd.playerId, t.owner, state.isTeamBattle) ? 'rgba(34, 197, 94, 0.8)' : 'rgba(14, 165, 233, 0.8)');

          ctx.fillStyle = '#ffffff'; ctx.font = `bold ${12/s}px sans-serif`; ctx.fillText(node.energy, node.x + currentR * 0.7, node.y + currentR * 0.7);

            ctx.fillStyle = isBlinking ? '#cbd5e1' : (node.type === 'dump' ? '#fca5a5' : '#cbd5e1'); ctx.fillText(title, node.x, node.y - currentR - 12/s);

              for (let i = 0; i < numParticles; i++) {
                const delay = i * (0.6 / numParticles), particleP = (moveP - delay) / 0.4; 
                if (particleP > 0 && particleP < 1) {
                  const px = s.x + (t.x - s.x) * particleP, py = s.y + (t.y - s.y) * particleP;
                  const dx = t.y - s.y, dy = -(t.x - s.x), len = Math.sqrt(dx*dx + dy*dy) || 1;
                  const waveAmt = Math.sin(particleP * Math.PI * 6 + i) * 6, nx = (dx/len) * waveAmt, ny = (dy/len) * waveAmt;
                  ctx.beginPath(); ctx.arc(px + nx, py + ny, m.hops === 2 ? 2.5 : 4, 0, Math.PI * 2);
                  ctx.fillStyle = m.hops === 2 ? '#c084fc' : COLORS.players[m.owner]; ctx.shadowBlur = 8 / cameraRef.current.scale; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;
                }
              }
              const headP = Math.max(0, Math.min(1, moveP / 0.4));
              if (headP > 0 && headP < 1) drawStrokedText(m.amount, s.x + (t.x - s.x) * headP, s.y + (t.y - s.y) * headP - 20/cameraRef.current.scale, '#fff', 14);
            });

                for (let i = 0; i < numSparks; i++) {
                  const angle = i * 137.5 * Math.PI / 180, dist = (20 + (i % 60)) * easeOut;

                  <p className={`text-slate-400 ${rx('mt-1 text-[10px]', 'mt-2 text-xs')} text-center`}>基本を学びながら<br/>ステージをクリア</p>
                </button>
                <button onClick={() => setGameMode('SOLO')} className={`flex-1 bg-black/80 ${rx('p-4', 'p-6')} rounded-xl border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] backdrop-blur flex flex-col items-center hover:bg-slate-900 transition-colors`}>
                  <span className={`${rx('text-4xl mb-2', 'text-5xl mb-3')}`}>👤</span>
                  <h3 className={`${rx('text-lg', 'text-xl')} text-white font-bold`}>単独感染 (ソロ)</h3>
                  <p className={`text-slate-400 ${rx('mt-1 text-[10px]', 'mt-2 text-xs')} text-center`}>宿主の免疫・他菌(AI)と<br/>一人で手軽に争う</p>
                </button>
                <button onClick={() => setGameMode('MULTI')} className={`flex-1 bg-black/80 ${rx('p-4', 'p-6')} rounded-xl border border-red-900 shadow-[0_0_15px_rgba(220,38,38,0.2)] backdrop-blur flex flex-col items-center hover:bg-slate-900 transition-colors`}>
                  <span className={`${rx('text-4xl mb-2', 'text-5xl mb-3')}`}>🌐</span>
                  <h3 className={`${rx('text-lg', 'text-xl')} text-red-400 font-bold`}>複合感染 (マルチ)</h3>
                  <p className={`text-slate-400 ${rx('mt-1 text-[10px]', 'mt-2 text-xs')} text-center`}>公開ルームやIDで<br/>別々のスマホやPCで対戦</p>
                </button>
              </div>
            ) : gameMode === 'SOLO' ? (
              <div className={`bg-black/80 ${rx('p-6 w-[90%]', 'p-8 w-auto')} rounded-xl border border-red-900 shadow-xl backdrop-blur flex flex-col items-center mt-4`}>
                <h3 className={`${rx('text-xl', 'text-2xl')} text-white font-bold ${rx('mb-4', 'mb-6')}`}>競合バクテリア数を選択</h3>
                <div className={`flex ${rx('flex-col gap-3', 'flex-row gap-4')} w-full mb-6`}>
                  <button onClick={() => startSoloGame(4, true)} className={`${rx('px-6 py-3', 'px-8 py-4')} bg-emerald-800 hover:bg-emerald-700 text-white font-bold rounded-lg transition-colors text-base md:text-xl w-full border border-emerald-600`}>2vs2 混合感染(チーム)</button>
                  {[2, 3, 4].map(num => (
                    <button key={num} onClick={() => startSoloGame(num, false)} className={`${rx('px-6 py-3', 'px-8 py-4')} bg-red-900 hover:bg-red-800 text-white font-bold rounded-lg transition-colors text-base md:text-xl w-full border border-red-700`}>{num} 菌株</button>
                  ))}
                </div>
                <button onClick={() => setGameMode(null)} className="text-slate-400 hover:text-white underline mt-2 md:mt-4 text-sm md:text-base">◀ モード選択へ戻る</button>
              </div>
            ) : (
              <div className="flex flex-col items-center mt-4 w-full px-4 max-w-4xl">
                <div className={`flex ${rx('flex-col gap-4', 'flex-row gap-6')} w-full`}>
                  
                  {/* ロビー一覧 */}
                  <div className={`bg-black/80 p-4 rounded-xl border border-red-900 shadow-xl backdrop-blur flex-1 flex flex-col ${rx('min-h-[250px] max-h-[300px]', 'min-h-[400px]')}`}>
                    <h3 className="text-lg text-red-400 font-bold mb-3 flex items-center justify-between">
                      <span>🌐 感染中宿主一覧 (ロビー)</span>
                      <div className="flex items-center gap-2">
                        {lobbyState === 'initializing' && <span className="text-xs text-slate-400 animate-pulse">探索中...</span>}
                        {lobbyState === 'is_server' && <span className="text-xs text-emerald-400">親機稼働中</span>}
                        {lobbyState === 'is_client' && <span className="text-xs text-sky-400">接続済</span>}
                        {lobbyState === 'disconnected' && <span className="text-xs text-red-500">切断・再接続中</span>}
                        <button onClick={() => { closeLobby(); setTimeout(initLobby, 500); }} className="text-xs bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded text-slate-300 border border-slate-600 transition-colors">🔄 更新</button>
                      </div>
                    </h3>
                    <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                      {roomList.filter(r => r.status === 'WAITING').length === 0 ? (
                        <div className="text-center mt-10">
                          <p className="text-slate-500 text-sm mb-2">現在感染できる公開宿主はありません。</p>
                          <p className="text-yellow-500/70 text-[10px] md:text-xs">※部屋が表示されない場合は、右の「IDで侵入」から<br/>直接ホストのIDを入力して合流してください。</p>
                        </div>
                      ) : (
                        roomList.filter(r => r.status === 'WAITING').map((r, idx) => (
                          <div key={idx} className="bg-slate-900/80 p-3 rounded border border-red-900/50 flex justify-between items-center">
                            <div>
                              <div className="font-bold text-white text-sm">{r.roomName}</div>
                              <div className="text-xs text-slate-400 mt-1">
                                {r.isTeamBattle ? '🤝 2vs2 混合' : `🦠 ${r.playerCount}菌株`} | 最初の菌: {r.hostName}
                              </div>
                            </div>
                            <div className="flex flex-col items-end gap-2">
                              <span className="text-xs font-bold text-red-300 bg-red-900/50 px-2 py-1 rounded">
                                {r.currentPlayers} / {r.playerCount} 株
                              </span>
                              <button onClick={() => joinRoom(r.roomId)} className="px-4 py-1 bg-red-800 hover:bg-red-700 text-white font-bold rounded text-xs transition-colors shadow border border-red-600">
                                侵入
                              </button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* 部屋作成 & プライベート参加 */}
                  <div className={`flex flex-col gap-4 w-full ${rx('','md:w-80')}`}>
                    <div className="bg-black/80 p-4 rounded-xl border border-red-900 shadow-xl backdrop-blur flex flex-col">
                      <h3 className="text-base text-yellow-500 font-bold mb-3">⛺ 新規宿主へ侵入 (ホスト)</h3>
                      <div className="flex gap-2 mb-3">
                        <input type="text" value={playerName} onChange={e=>setPlayerName(e.target.value)} placeholder="菌株名" className="flex-1 px-2 py-2 rounded bg-slate-900 text-white border border-slate-700 text-sm w-1/2" maxLength={8} />
                        <input type="text" value={roomNameSuffix} onChange={e=>setRoomNameSuffix(e.target.value)} placeholder="の宿主" className="flex-1 px-2 py-2 rounded bg-slate-900 text-white border border-slate-700 text-sm w-1/2" maxLength={10} />
                      </div>
                      <label className="flex items-center gap-2 text-sm text-slate-300 mb-4 cursor-pointer w-fit">
                        <input type="checkbox" checked={isPrivate} onChange={e=>setIsPrivate(e.target.checked)} className="w-4 h-4 accent-red-600" />
                        鍵をかける (一覧に非公開)
                      </label>
                      <div className="flex flex-wrap gap-2">
                        <button onClick={() => startHosting(4, true)} className="w-full mb-1 px-2 py-2 bg-emerald-800 hover:bg-emerald-700 text-white font-bold rounded transition-colors text-sm shadow border border-emerald-600">2vs2 混合感染</button>
                        {[2, 3, 4].map(num => (
                          <button key={num} onClick={() => startHosting(num, false)} className="flex-1 px-2 py-2 bg-red-900 hover:bg-red-800 text-white font-bold rounded transition-colors text-sm shadow border border-red-700">{num} 菌株</button>
                        ))}
                      </div>
                    </div>

                    <div className="bg-black/80 p-4 rounded-xl border border-red-900 shadow-xl backdrop-blur flex flex-col">
                      <h3 className="text-base text-slate-300 font-bold mb-3">🔑 IDで侵入 (非公開宿主など)</h3>
                      <div className="flex gap-2 w-full">
                        <input type="text" placeholder="宿主ID" value={joinInput} onChange={(e) => setJoinInput(e.target.value)} className="flex-1 px-3 py-2 rounded bg-slate-900 text-white border border-slate-700 uppercase font-mono text-center tracking-widest text-sm" maxLength={4} />
                        <button onClick={() => joinRoom(joinInput)} disabled={!joinInput} className="px-5 py-2 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 text-white font-bold rounded transition-colors text-sm shadow">侵入</button>
                      </div>
                      {errorMsg && <p className="text-red-500 text-xs mt-2 font-bold">{errorMsg}</p>}
                    </div>
                  </div>

                </div>
                <button onClick={() => setGameMode(null)} className="text-slate-400 hover:text-white underline mt-6 text-sm">◀ モード選択へ戻る</button>
              </div>
            )}
          </div>
        );
      }

      if (phase === 'WAITING_ROOM') {
        return (
          <div className="w-full h-[100dvh] flex flex-col items-center justify-center font-sans text-white p-4 relative" style={{ backgroundImage: BACKGROUNDS.normal, backgroundSize: 'cover', backgroundPosition: 'center', boxShadow: 'inset 0 0 0 2000px rgba(0, 0, 0, 0.85)' }}>
            
            <div className="absolute top-2 right-2 z-[100] flex gap-2">
              <button onClick={() => setConfirmQuit(true)} className="bg-red-900/80 hover:bg-red-800 px-3 py-2 rounded-lg border border-red-700 text-white font-bold backdrop-blur text-xs shadow-lg">
                離脱 / 戻る
              </button>
            </div>

            <h2 className={`${rx('text-2xl', 'text-4xl')} font-black text-red-500 mb-4 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)] flex items-center gap-2`}>✅ 宿主への侵入成功！</h2>
            <p className={`${rx('text-sm', 'text-xl')} mb-10 text-slate-300 text-center`}>P2Pネットワークによる直接通信が確立されました。</p>
            
            <div className={`bg-black/80 ${rx('p-4', 'p-6')} rounded-xl border border-red-900 shadow-xl backdrop-blur w-full max-w-md mb-10`}>
              <h3 className={`${rx('text-base', 'text-lg')} text-slate-300 mb-4 font-bold border-b border-slate-800 pb-2 flex justify-between items-center`}>
                <span>感染菌株 ({gameData?.playerUids?.length || (gameMode === 'HOST' ? 1 : 0)} / {gameData?.playerCount || '-'})</span>
                <div className="flex items-center gap-2">
                  {(lobbyState === 'is_server' || lobbyState === 'is_client') && !isPrivate ? (
                    <span className="text-[10px] text-emerald-400">🌐 ロビー公開中</span>
                  ) : isPrivate ? (
                    <span className="text-[10px] text-slate-400">🔒 非公開</span>
                  ) : (
                    <span className="text-[10px] text-yellow-500 animate-pulse">🌐 接続待機中...</span>
                  )}
                  <span className="font-mono text-red-400 bg-red-900/30 px-2 py-1 rounded border border-red-800/50">ID: {roomId}</span>
                </div>
              </h3>
              <ul className="space-y-3">
                {gameData?.playerUids?.map((uid, i) => (
                  <li key={uid} className={`bg-slate-900/80 ${rx('px-3 py-2', 'px-4 py-3')} rounded-lg flex justify-between items-center border border-slate-700`}>
                    <div className="flex items-center gap-3">
                      <div className={`${rx('w-3 h-3', 'w-4 h-4')} rounded-full`} style={{backgroundColor: COLORS.players[gameData.players[uid]]}}></div>
                      <span className={`font-bold ${rx('text-sm', 'text-lg')}`}>
                        {gameData.playerNames?.[uid] || `菌株 ${gameData.players[uid]}`} {uid === myUid ? '(あなた)' : ''}
                      </span>
                    </div>
                    {gameData.hostUid === uid && <span className={`text-yellow-500 ${rx('text-[10px]', 'text-xs')} font-black bg-yellow-900/30 border border-yellow-700/50 px-2 py-1 rounded`}>HOST</span>}
                  </li>
                ))}
              </ul>
            </div>

            {gameMode === 'HOST' ? (
              <button onClick={startGame} className={`px-12 py-5 bg-gradient-to-r from-red-800 to-red-600 hover:from-red-700 hover:to-red-500 text-white font-black ${rx('text-lg', 'text-2xl')} rounded-xl shadow-[0_0_20px_rgba(239,68,68,0.4)] border border-red-500 transition-all hover:-translate-y-1 w-full max-w-md`}>
                感染開始 (空きはAI)
              </button>
            ) : (
              <div className="flex items-center gap-3 text-red-400 text-lg animate-pulse text-center">
                ⏳ ホストが感染を開始するのを待っています...
              </div>
            )}
            
            {confirmQuit && (
              <div className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-4">
                <div className="bg-slate-900 p-6 rounded-xl border border-red-900 shadow-[0_0_30px_rgba(220,38,38,0.3)] max-w-sm w-full text-center">
                  <h3 className="text-xl font-bold text-red-400 mb-4">宿主から離脱しますか？</h3>
                  <p className="text-slate-400 text-sm mb-6">対戦中の場合、通信は切断されます。</p>
                  <div className="flex gap-4">
                    <button onClick={() => setConfirmQuit(false)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg font-bold text-white">キャンセル</button>
                    <button onClick={quitGame} className="flex-1 py-3 bg-red-800 hover:bg-red-700 border border-red-600 text-white rounded-lg font-bold">離脱する</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const currentDayIndex = gameState ? (gameState.turn - 1) % 7 : 0;

      return (
        <div className="w-full h-[100dvh] bg-black flex flex-col items-center justify-center font-sans select-none text-white overflow-hidden relative">
          
          <div className="absolute top-2 left-2 z-[100] flex gap-2">
            <button onClick={() => setLayoutMode(m => m === 'auto' ? 'mobile' : m === 'mobile' ? 'pc' : 'auto')} className="bg-black/80 hover:bg-slate-900 p-2 md:px-3 rounded-lg border border-red-900 text-slate-300 backdrop-blur text-xs flex items-center gap-1 shadow-lg">
              {layoutMode === 'auto' ? '🔄 Auto' : layoutMode === 'mobile' ? '📱 スマホ版' : '💻 PC版'}
            </button>
          </div>

          <div className="absolute top-2 right-2 z-[100] flex gap-2">
            {phase !== 'SETUP' && (
              <button onClick={() => setConfirmQuit(true)} className="bg-red-900/80 hover:bg-red-800 px-3 py-2 rounded-lg border border-red-700 text-white font-bold backdrop-blur text-xs shadow-lg">
                離脱 / 戻る
              </button>
            )}
          </div>

          {confirmQuit && (
            <div className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-4">
              <div className="bg-slate-900 p-6 rounded-xl border border-red-900 shadow-[0_0_30px_rgba(220,38,38,0.3)] max-w-sm w-full text-center">
                <h3 className="text-xl font-bold text-red-400 mb-4">宿主から離脱しますか？</h3>
                <p className="text-slate-400 text-sm mb-6">対戦中の場合、通信は切断されます。</p>
                <div className="flex gap-4">
                  <button onClick={() => setConfirmQuit(false)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg font-bold text-white">キャンセル</button>
                  <button onClick={quitGame} className="flex-1 py-3 bg-red-800 hover:bg-red-700 border border-red-600 text-white rounded-lg font-bold">離脱する</button>
                </div>
              </div>
            </div>
          )}
          
          <div className={`flex-shrink-0 w-full max-w-[1200px] ${rx('p-2 mt-12', 'p-4 mt-8')} flex justify-between items-start z-10 pointer-events-none`}>
            <div className={`flex flex-col ${rx('gap-1', 'gap-2')} pointer-events-auto`}>
              <div className={`flex ${rx('gap-1', 'gap-3')}`}>
                {Array.from({length: gameState.playerCount}).map((_, i) => {
                  const p = i + 1; const isAlive = gameState.alivePlayers?.includes(p) ?? false;
                  
                  let label = `菌株 ${p}`;
                  if (p === myPlayerNum) label = '自派閥';
                  else if (gameState.isTeamBattle && getTeam(p, true) === getTeam(myPlayerNum, true)) label = '同盟菌';

                  return (
                    <div key={p} className={`px-2 py-1 ${rx('','md:px-4 md:py-2')} rounded-lg flex items-center gap-1 border transition-all ${isAlive ? 'opacity-100' : 'opacity-30 grayscale'}`} style={{ borderColor: COLORS.players[p], backgroundColor: `${COLORS.players[p]}44` }}>
                      <span className={`${rx('text-xs', 'text-base')}`}>{p === myPlayerNum ? '🛡️' : '🦠'}</span>
                      <span className={`font-bold ${rx('text-[10px] hidden','text-sm inline')}`}>{label}</span>
                    </div>
                  );
                })}
              </div>
              {(phase === 'INPUT' || phase === 'WAITING_FOR_OTHERS') && gameState.alivePlayers?.includes(myPlayerNum) && gameState.chips[myPlayerNum]?.length > 0 && (
                <div className={`flex flex-wrap ${rx('gap-1 max-w-[200px]', 'gap-2')} mt-1`}>
                  {gameState.chips[myPlayerNum].map((chipId, idx) => {
                    const isUsed = playerCommands.some(c => c.type === 'use_chip' && c.chipIdx === idx);
                    const usedCount = playerCommands.filter(c => c.type === 'use_chip').length;
                    const isDisabled = isUsed || (!isUsed && usedCount >= 2) || phase !== 'INPUT';
                    const isSelected = selectedChip?.idx === idx;
                    const info = CHIP_TYPES[chipId];

                    return (
                      <div key={idx} className="relative group">
                        <button onClick={() => !isDisabled && handleChipSelect(chipId, idx)} disabled={isDisabled && !isSelected} className={`flex items-center gap-1 ${rx('px-1 py-0.5', 'px-2 py-1')} rounded ${rx('text-[10px]', 'text-xs')} border transition-all ${isUsed ? 'bg-slate-800 text-slate-500 border-slate-700' : isSelected ? 'bg-red-800 text-white border-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)]' : isDisabled ? 'bg-slate-900 text-slate-600 border-slate-800 opacity-50' : 'bg-slate-900 text-red-300 border-red-900 hover:bg-slate-800'}`}>
                          <span>{info.icon}</span>
                          <span className={`${rx('hidden', 'inline')}`}>{info.name}</span>
                        </button>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
            
            <div className={`flex flex-col items-end ${rx('gap-1', 'gap-2')}`}>
              {gameMode === 'MULTI' && <div className={`text-red-400 font-mono ${rx('text-[10px]', 'text-sm')} bg-black/80 px-2 py-0.5 rounded border border-red-900 flex items-center gap-1`}><span className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span><span className={`${rx('hidden', 'inline')}`}>HOST: </span>{roomId}</div>}
              {gameState.isTeamBattle && <div className={`text-emerald-400 font-bold ${rx('text-[10px]', 'text-sm')} bg-black/80 px-2 py-0.5 rounded border border-emerald-900 flex items-center gap-1`}><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>2vs2 混合感染</div>}
              <div className={`flex ${rx('flex-col items-end gap-1', 'flex-row items-center gap-4')} bg-black/80 border border-slate-800 ${rx('px-3 py-1 rounded-lg', 'px-5 py-2 rounded-full')} shadow-lg pointer-events-auto`}>
                <div className={`flex items-center gap-1 text-slate-300 ${rx('text-xs', 'text-base')}`}>
                  <span className="text-red-500 text-sm md:text-base">⏳</span> <span className="font-bold">第{gameState.turn}期 <span className={`${rx('hidden', 'inline')}`}></span></span>
                </div>
                <div className={`flex items-center gap-1 text-slate-300 ${rx('border-none pl-0 text-xs', 'border-l border-slate-700 pl-4 text-base')}`}>
                  {renderWeatherIcon(gameState.weather, rx('w-4 h-4', 'w-6 h-6'))} <span className={`font-bold ${rx('hidden', 'inline')}`}>{getWeatherName(gameState.weather)}</span>
                </div>
                <div className={`flex items-center gap-1 text-orange-400 ${rx('border-none pl-0 text-[10px]', 'border-l border-slate-700 pl-4 text-sm')} font-bold`}>
                  💀 <span className={`${rx('hidden', 'inline')}`}>崩壊まであと: </span>{gameState.nextTrashTurn - gameState.turn} 期
                </div>
              </div>
            </div>
          </div>

          <div className="flex-1 w-full max-w-[1200px] flex flex-col min-h-0 relative z-0">
            <div className={`flex-1 relative border border-slate-800 bg-black/50 rounded-t-xl overflow-hidden touch-none ${gameState?.immuneTargets?.length > 0 ? 'immune-target' : ''}`} ref={mapContainerRef}>
              
              <canvas ref={canvasRef} onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} onPointerLeave={handlePointerUp} onClick={handleCanvasClick} className={`absolute top-0 left-0 w-full h-full ${phase==='INPUT' ? 'cursor-crosshair' : ''}`} />
              
              <div className="absolute bottom-4 right-4 flex flex-col gap-2 z-20 pointer-events-auto">
                <button onClick={()=>zoom(1.2)} className="bg-black/80 hover:bg-slate-900 p-2 md:p-3 rounded-lg text-slate-300 border border-slate-700 shadow-lg text-lg">➕</button>
                <button onClick={()=>zoom(0.8)} className="bg-black/80 hover:bg-slate-900 p-2 md:p-3 rounded-lg text-slate-300 border border-slate-700 shadow-lg text-lg">➖</button>
                <button onClick={resetCamera} className="bg-black/80 hover:bg-slate-900 p-2 md:p-3 rounded-lg text-slate-300 border border-slate-700 shadow-lg text-lg">🔄</button>
              </div>

              {gameMode === 'TUTORIAL' && phase === 'INPUT' && (
                <div className={`absolute ${rx('top-4 w-[90%]', 'top-8 w-full max-w-3xl')} left-1/2 transform -translate-x-1/2 z-20 pointer-events-none`}>
                  <div className="bg-black/95 border border-red-900 text-red-100 p-3 rounded-xl shadow-[0_0_20px_rgba(220,38,38,0.3)] pointer-events-auto text-center">
                    <h3 className={`${rx('text-sm', 'text-lg')} font-bold text-yellow-500 mb-1`}>{PLAYABLE_TUTORIALS.find(s=>s.id === tutorialStage)?.title}</h3>
                    <p className={`${rx('text-xs', 'text-sm')} whitespace-pre-wrap leading-relaxed`}>{PLAYABLE_TUTORIALS.find(s=>s.id === tutorialStage)?.message}</p>
                  </div>
                </div>
              )}

              {phase === 'ANIMATING' && (
                 <div className={`absolute ${rx('top-4 text-xs px-4 py-1', 'top-8 text-xl px-8 py-2')} left-1/2 transform -translate-x-1/2 text-white font-black tracking-widest bg-black/90 border border-red-500 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.5)] z-10 whitespace-nowrap`}>
                   {animRef.current.progress < 0.25 ? 'PHASE 1: 変異・壁硬化' : 
                    animRef.current.progress < 0.6 ? 'PHASE 2: 浸潤 & 感染' : 
                    animRef.current.progress < 0.85 ? 'PHASE 3: 免疫・組織奪取' : 'PHASE 4: 増殖・生体反応'}
                 </div>
              )}

              {phase === 'WAITING_FOR_OTHERS' && (
                <div className="absolute inset-0 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center z-40 pointer-events-auto">
                  <span className={`${rx('text-4xl mb-4', 'text-6xl mb-6')} animate-spin text-red-500 inline-block`}>🧬</span>
                  <h2 className={`${rx('text-lg mb-6', 'text-3xl mb-8')} font-black text-white tracking-widest drop-shadow-lg`}>他菌株の変異を待機中...</h2>
                  <div className="flex flex-wrap justify-center gap-2 px-4">
                     {Object.values(gameData?.players || {}).filter(p => gameState.alivePlayers?.includes(p)).map(p => {
                       const isReady = gameData?.turnReady?.[p];
                       return (
                         <div key={p} className={`px-4 py-2 rounded-lg border flex flex-col items-center gap-1 shadow-lg transition-colors ${isReady ? 'bg-red-900/80 border-red-600 text-white' : 'bg-slate-900/80 border-slate-700 text-slate-500'}`}>
                           <span className={`font-bold ${rx('text-sm', 'text-lg')}`}>
                             {gameData?.playerNames?.[gameData.playerUids.find(uid => gameData.players[uid] === p)] || `菌株 ${p}`}
                           </span>
                           <span className="text-[10px]">{isReady ? '変異完了' : '代謝中...'}</span>
                         </div>
                       );
                     })}
                  </div>
                </div>
              )}

              {phase === 'TUTORIAL_CLEAR' && (
                <div className="absolute inset-0 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center z-50 p-4 text-center">
                  <h1 className={`${rx('text-4xl', 'text-7xl')} font-black mb-4 text-red-500 drop-shadow-[0_0_20px_rgba(239,68,68,0.5)]`}>INFECTION COMPLETE!</h1>
                  {tutorialStage < PLAYABLE_TUTORIALS.length ? (
                    <button onClick={() => startPlayableTutorial(tutorialStage + 1)} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-slate-800 border border-red-900 hover:bg-slate-700 text-white font-bold rounded-xl mt-4 transition-all shadow-xl pointer-events-auto`}>
                      次の組織へ ▶
                    </button>
                  ) : (
                    <div className="flex flex-col items-center">
                      <p className={`text-yellow-500 ${rx('text-lg mb-4', 'text-2xl mb-6')} font-bold`}>全てのチュートリアルをクリアしました！</p>
                      <button onClick={quitGame} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-slate-800 border border-red-900 hover:bg-slate-700 text-white font-bold rounded-xl transition-all shadow-xl pointer-events-auto`}>
                        タイトルへ戻る
                      </button>
                    </div>
                  )}
                </div>
              )}

              {phase === 'GAME_OVER' && (
                <div className="absolute inset-0 bg-black/90 backdrop-blur-sm flex flex-col items-center justify-center z-50 p-4 text-center">
                  {gameState.isTeamBattle ? (
                    <h1 className={`${rx('text-4xl', 'text-7xl')} font-black mb-4 drop-shadow-lg`} style={{ color: gameState.winner === 1 ? COLORS.players[1] : (gameState.winner === 2 ? COLORS.players[3] : '#cbd5e1'), textShadow: '0 0 20px currentColor' }}>
                      {gameState.winner === getTeam(myPlayerNum, true) ? 'PANDEMIC COMPLETE!' : gameState.winner ? `TEAM ${gameState.winner} DOMINATED!` : 'COEXISTENCE (DRAW)'}
                    </h1>
                  ) : (
                    <h1 className={`${rx('text-4xl', 'text-7xl')} font-black mb-4 drop-shadow-lg`} style={{ color: gameState.winner ? COLORS.players[gameState.winner] : '#cbd5e1', textShadow: '0 0 20px currentColor' }}>
                      {gameState.winner === myPlayerNum ? 'PANDEMIC COMPLETE!' : gameState.winner ? `菌株 ${gameState.winner} の支配` : 'COEXISTENCE'}
                    </h1>
                  )}
                  {((gameState.isTeamBattle && gameState.winner !== getTeam(myPlayerNum, true) && gameState.winner !== null) || (!gameState.isTeamBattle && gameState.winner !== myPlayerNum && gameState.winner !== null)) && (
                      <p className={`text-red-500 ${rx('text-xl', 'text-2xl')} font-bold mb-4 tracking-widest`}>免疫による完全排除</p>
                  )}
                  
                  {gameMode === 'TUTORIAL' ? (
                     <button onClick={() => startPlayableTutorial(tutorialStage)} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-slate-800 border border-red-900 hover:bg-slate-700 text-white font-bold rounded-xl mt-4 transition-all shadow-xl pointer-events-auto`}>再感染 (リトライ)</button>
                  ) : (
                     <button onClick={quitGame} className={`${rx('px-6 py-3 text-base', 'px-10 py-4 text-xl')} bg-slate-800 border border-red-900 hover:bg-slate-700 text-white font-bold rounded-xl mt-4 transition-all shadow-xl pointer-events-auto`}>タイトルへ戻る</button>
                  )}
                </div>
              )}

              {renderTargetPrompt()}
              {renderSlider()}
            </div>

            <div className="h-3 md:h-4 bg-slate-900 cursor-row-resize hover:bg-red-900 transition-colors z-30 w-full flex-shrink-0 flex items-center justify-center border-x border-slate-800 pointer-events-auto" onPointerDown={handleResizerPointerDown} style={{ touchAction: 'none' }}>
               <div className="w-12 h-1 bg-slate-600 rounded-full pointer-events-none"></div>
            </div>

            <div style={{ height: bottomPanelHeight }} className={`w-full flex ${rx('flex-col gap-2 px-2 py-2 pb-6', 'flex-row gap-6 px-4 py-2 md:pb-2')} flex-shrink-0 border-x border-b border-slate-800 rounded-b-xl bg-black pointer-events-auto`}>
              <div className={`flex-1 bg-slate-900/50 border border-slate-800 rounded-xl ${rx('p-2', 'p-4')} relative flex flex-col min-h-0 overflow-y-auto`}>
                <h3 className={`text-slate-500 ${rx('text-xs', 'text-sm')} font-bold mb-2 flex items-center justify-between flex-shrink-0`}>
                  <div className="flex items-center gap-1">🧬 代謝予定 <span className={`${rx('hidden', 'inline')}`}>(1組織につき1行動)</span></div>
                  <button onClick={handleAiAdvice} disabled={gameMode === 'TUTORIAL' || (phase !== 'INPUT' && phase !== 'WAITING_FOR_OTHERS') || isAiLoading || !gameState?.alivePlayers?.includes(myPlayerNum)} className={`flex items-center gap-1 bg-red-900/30 hover:bg-red-900/60 text-red-400 ${rx('px-2 py-1 text-[10px]', 'px-3 py-1 text-xs')} rounded transition-colors border border-red-900/50 disabled:opacity-50 disabled:cursor-not-allowed`}>
                    ✨ <span className={`${rx('hidden', 'inline')}`}>プラスミドAIに</span>解析
                  </button>
                </h3>
                {!gameState?.alivePlayers?.includes(myPlayerNum) && (phase === 'INPUT' || phase === 'WAITING_FOR_OTHERS') ? (
                   <div className={`text-red-600 ${rx('text-xs', 'text-sm')} flex-shrink-0`}>あなたの菌株は排除されました。観測モードです。</div>
                ) : (
                  <div className={`flex flex-wrap ${rx('gap-1', 'gap-2')} content-start`}>
                    {playerCommands.map((cmd, idx) => (
                      <div key={idx} className={`border rounded ${rx('px-2 py-1 text-[10px]', 'px-3 py-1.5 text-sm')} flex items-center gap-1 shadow ${cmd.type === 'use_chip' ? 'bg-red-950/80 border-red-800 text-red-200' : 'bg-slate-800 border-slate-700 text-slate-300'}`}>
                        {cmd.type === 'move' && (() => {
                           const isStealth = playerCommands.some(c => c.type === 'use_chip' && c.chip === 'STEALTH' && c.targetId === cmd.nodeId);
                           return <><span className="text-red-500">➡️</span> {cmd.nodeId} → {cmd.targetId} ({cmd.amount}) {isStealth && '(擬態)'}</>;
                        })()}
                        {cmd.type === 'toggle_mode' && <><span className="text-purple-500">〰️</span> {cmd.nodeId} 芽胞化</>}
                        {cmd.type === 'upgrade' && <><span className="text-emerald-500">🛠️</span> {cmd.nodeId} 膜形成</>}
                        {cmd.type === 'cut' && <><span className="text-orange-500">✂️</span> {cmd.nodeId}-{cmd.targetId} 硬化</>}
                        {cmd.type === 'use_chip' && (() => {
                          const info = CHIP_TYPES[cmd.chip];
                          return (
                            <>
                              <span className="text-red-400">{info.icon}</span>
                              <span className={`${rx('hidden', 'inline')}`}>{info.name}</span> {cmd.targetId && `-> ${cmd.targetId}`}
                            </>
                          );
                        })()}
                        {phase === 'INPUT' && <button onClick={() => removeCommand(cmd)} className="text-slate-600 hover:text-white ml-1">✖</button>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <button onClick={handleLockIn} disabled={phase !== 'INPUT'} className={`flex-shrink-0 w-full md:w-64 bg-gradient-to-r from-red-900 to-red-700 hover:from-red-800 disabled:from-slate-800 disabled:to-slate-900 disabled:text-slate-700 disabled:border-slate-800 border border-red-600 text-white font-black rounded-xl transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(220,38,38,0.2)] ${rx('h-14 text-xl', 'h-auto text-2xl')}`}>
                <span className={`${rx('text-xl', 'text-2xl')}`}>🧬</span> {gameState?.alivePlayers?.includes(myPlayerNum) ? '変異確定' : '代謝中'}
              </button>
            </div>
          </div>

          {renderMenu()}
          
          {/* AI Advice Panel */}
          {showAiPanel && (
            <div className="fixed inset-0 bg-black/80 z-[300] flex items-center justify-center p-4">
              <div className="bg-slate-900 p-6 rounded-xl border border-red-900 shadow-[0_0_30px_rgba(220,38,38,0.4)] max-w-lg w-full relative">
                <button onClick={() => setShowAiPanel(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white text-xl">✖</button>
                <h3 className="text-xl font-bold text-red-400 mb-4 flex items-center gap-2"><span>🧬</span> プラスミドAI 解析結果</h3>
                <div className="bg-black border border-slate-800 rounded-lg p-4 min-h-[120px] text-sm text-slate-300 leading-relaxed whitespace-pre-wrap">
                  {isAiLoading ? <span className="animate-pulse text-red-500">宿主環境を解析中...</span> : aiAdvice}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NodeWars />);
  </script>
</body>
</html>
